function getSunTimes(lat, lng) {
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  const B = (360/365)*(dayOfYear-81)*(Math.PI/180);
  const EoT = 9.87*Math.sin(2*B) - 7.53*Math.cos(B) - 1.5*Math.sin(B);
  const solarNoon = 720 - (4*lng + EoT);
  const latRad = lat*(Math.PI/180);
  const decl = 23.45*Math.sin(B)*(Math.PI/180);
  const cosHA = (Math.cos(90.833*Math.PI/180) - Math.sin(latRad)*Math.sin(decl)) / (Math.cos(latRad)*Math.cos(decl));
  if (cosHA < -1 || cosHA > 1) return {sunrise:6*60, sunset:19*60};
  const HA = Math.acos(cosHA)*(180/Math.PI);
  const offset = now.getTimezoneOffset();
  return {sunrise: solarNoon - HA*4 - offset, sunset: solarNoon + HA*4 - offset};
}

let _sunCache=null, _sunCacheDate=null, _cachedLat=null, _cachedLng=null;
function isDaytime() {
  const now=new Date(), mins=now.getHours()*60+now.getMinutes(), today=now.toDateString();
  if (_sunCache && _sunCacheDate===today) return mins>=_sunCache.sunrise && mins<_sunCache.sunset;
  if (_cachedLat!==null) { _sunCache=getSunTimes(_cachedLat,_cachedLng); _sunCacheDate=today; return mins>=_sunCache.sunrise && mins<_sunCache.sunset; }
  return now.getHours()>=6 && now.getHours()<19;
}

function SummaryRing({spent,total,t,size=128}){
  const pct=total>0?Math.min(spent/total,1):0;
  const r=size*0.42,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  const fc=pct>=1?t.over:pct>=0.85?t.near:t.accent;
  const fs=size<110?11:15;
  return(
    <svg width={size} height={size} style={{display:"block",flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={t.fillBg} strokeWidth={size*0.078}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={fc} strokeWidth={size*0.078}
        strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${cx} ${cy})`}
        style={{transition:"stroke-dasharray 0.8s cubic-bezier(0.34,1.56,0.64,1),stroke 0.4s"}}/>
      <text x={cx} y={cy-fs*0.55} textAnchor="middle" fill={t.text} fontSize={fs} fontWeight={800} fontFamily="'Nunito',sans-serif">{fmt(spent)}</text>
      <text x={cx} y={cy+fs*0.65} textAnchor="middle" fill={t.textMuted} fontSize={fs-4} fontFamily="'Nunito',sans-serif">of {fmt(total)}</text>
      <text x={cx} y={cy+fs*1.85} textAnchor="middle" fill={fc} fontSize={fs-2} fontWeight={800} fontFamily="'Nunito',sans-serif">{Math.round(pct*100)}%</text>
    </svg>
  );
}

    @keyframes toastIn{0%{opacity:0;transform:translateY(16px) scale(0.96)}12%,88%{opacity:1;transform:none}100%{opacity:0}}
    .scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .scroll-area::-webkit-scrollbar{width:3px}
    .scroll-area::-webkit-scrollbar-thumb{background:${t.borderCard};border-radius:99px}
    .cat-card{transition:transform 0.15s ease}.cat-card:active{transform:scale(0.984)}
    .tap-btn{transition:opacity 0.12s,transform 0.12s}.tap-btn:active{opacity:0.7;transform:scale(0.95)}
    .nav-btn{transition:color 0.2s,background 0.2s}
    .cat-scroll::-webkit-scrollbar{display:none}
    input[type=color]{-webkit-appearance:none}
    input[type=color]::-webkit-color-swatch-wrapper{padding:2px}
    input[type=color]::-webkit-color-swatch{border:none;border-radius:6px}
  `;

  const selCat=categories.find(c=>c.id===addForm.catId);
  const canSave=addForm.catId&&addForm.amount&&!isNaN(parseFloat(addForm.amount));

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
      <style>{css}</style>
      {isTablet ? (
        <div style={{display:"flex",height:"100dvh",background:t.bg,fontFamily:"'Nunito',sans-serif",color:t.text}}>
          {toast&&<div style={{position:"fixed",bottom:32,left:"50%",transform:"translateX(-50%)",background:t.accent,color:t.accentText,padding:"12px 26px",borderRadius:99,fontSize:14,fontWeight:800,zIndex:300,whiteSpace:"nowrap",animation:"toastIn 2.2s forwards",pointerEvents:"none"}}>{toast}</div>}
          <div style={{width:260,flexShrink:0,background:t.sidebarBg,borderRight:`1px solid ${t.sidebarBorder}`,display:"flex",flexDirection:"column",padding:"32px 0 24px"}}>
            <div style={{padding:"0 24px 28px"}}>
              <div style={{fontSize:10,color:t.textMuted,letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>Our Budget</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:t.text,lineHeight:1.2}}>Spend<br/>Together</div>
              <div style={{marginTop:10,fontSize:11,color:syncPill.color,fontWeight:800,background:syncPill.color+"18",borderRadius:99,padding:"3px 10px",display:"inline-block"}}>{syncPill.label}</div>
            </div>
            <div style={{padding:"0 24px 24px",borderBottom:`1px solid ${t.sidebarBorder}`}}>
              <SummaryRing spent={totalSpent} total={periodIncome||totalBudget} t={t} size={210}/>
              <div style={{marginTop:14}}>
                {periodIncome>0&&<StatRow label="Income" value={fmtDec(periodIncome)} color={t.accent} t={t}/>}
                <StatRow label="Budgeted" value={fmt(totalBudget)} color={t.textSub} t={t}/>
                <StatRow label="Spent" value={fmtDec(totalSpent)} color={totalSpent>totalBudget?t.over:t.accent} big t={t}/>
                <StatRow label="Remaining" value={fmtDec(remaining)} color={remaining<0?t.over:t.remaining} t={t}/>
                {actualSavings!==null&&<StatRow label="Savings" value={fmtDec(actualSavings)} color={actualSavings>=0?t.accent:t.over} t={t}/>}
              </div>
            </div>
            <div style={{padding:"16px 24px",borderBottom:`1px solid ${t.sidebarBorder}`}}>
              <div style={{display:"flex",background:t.bgPill,borderRadius:20,padding:3,gap:2,marginBottom:10}}>
                {DURATIONS.map(d=><button key={d} className="tap-btn" onClick={()=>setDuration(d)} style={{border:"none",borderRadius:17,padding:"5px 0",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit",background:duration===d?t.bgPillActive:"transparent",color:duration===d?t.text:t.textMuted,flex:1}}>{d}</button>)}
              </div>
              {periodNav}
            </div>
            <div style={{flex:1,padding:"12px 12px 0"}}>
              {NAV_ITEMS.map(item=>(
                <button key={item.id} className="nav-btn" onClick={()=>setView(item.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"12px 14px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:800,textAlign:"left",background:view===item.id?t.accent+"18":"transparent",color:view===item.id?t.accent:t.textMuted,marginBottom:2}}>
                  <span style={{fontSize:18,width:24,textAlign:"center"}}>{item.icon}</span>{item.label}
                </button>
              ))}
            </div>
            <div style={{padding:"0 12px"}}>
              <button className="tap-btn" onClick={cycleTheme} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${t.borderCard}`,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:800,color:t.textSub,background:t.bgPill}}>
                <span style={{fontSize:16}}>{themeIcon}</span> {themeLabel} Theme
              </button>
            </div>
          </div>
          <div ref={scrollRef} className="scroll-area" style={{flex:1,minWidth:0,background:t.bg}}>
            {view==="budget"&&<BudgetView/>}
            {view==="add"&&<AddView/>}
            {view==="history"&&<HistoryView/>}
            {view==="manage"&&<ManageView/>}
          </div>
        </div>
      ) : (
        <div style={{fontFamily:"'Nunito',sans-serif",background:t.bg,height:"100dvh",maxWidth:430,margin:"0 auto",color:t.text,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {toast&&<div style={{position:"absolute",bottom:80,left:"50%",transform:"translateX(-50%)",background:t.accent,color:t.accentText,padding:"10px 22px",borderRadius:99,fontSize:14,fontWeight:800,zIndex:200,whiteSpace:"nowrap",animation:"toastIn 2.2s forwards",pointerEvents:"none"}}>{toast}</div>}
          <div style={{flexShrink:0,padding:"22px 20px 14px",background:t.bgHeader,zIndex:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                  <div style={{fontSize:10,color:t.textMuted,letterSpacing:3,textTransform:"uppercase"}}>Our Budget</div>
                  <div style={{fontSize:10,color:syncPill.color,fontWeight:800,background:syncPill.color+"18",borderRadius:99,padding:"2px 8px"}}>{syncPill.label}</div>
                </div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,letterSpacing:-0.5,color:t.text}}>Spend Together</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                <button className="tap-btn" onClick={cycleTheme} style={{display:"flex",alignItems:"center",gap:5,background:t.bgPill,border:`1px solid ${t.borderCard}`,borderRadius:20,padding:"5px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:800,color:t.textSub}}>{themeIcon} {themeLabel}</button>
                <div style={{display:"flex",background:t.bgPill,borderRadius:20,padding:3,gap:2}}>
                  {DURATIONS.map(d=><button key={d} className="tap-btn" onClick={()=>setDuration(d)} style={{border:"none",borderRadius:17,padding:"5px 10px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit",background:duration===d?t.bgPillActive:"transparent",color:duration===d?t.text:t.textMuted}}>{d.slice(0,2)}</button>)}
                </div>
              </div>
            </div>
            {periodNav}
          </div>
          <div ref={scrollRef} className="scroll-area" style={{flex:1,minHeight:0,paddingBottom:16}}>
            {view==="budget"&&<BudgetView/>}
            {view==="add"&&<AddView/>}
            {view==="history"&&<HistoryView/>}
            {view==="manage"&&<ManageView/>}
          </div>
          <div style={{flexShrink:0,background:t.bgNav,borderTop:`1px solid ${t.borderNav}`,display:"flex"}}>
            {NAV_ITEMS.map(tab=>(
              <button key={tab.id} className="nav-btn" onClick={()=>setView(tab.id)} style={{flex:1,border:"none",background:"none",padding:"12px 0 10px",cursor:"pointer",color:view===tab.id?t.accent:t.textNav,fontFamily:"inherit"}}>
                <div style={{fontSize:tab.id==="add"?22:18}}>{tab.icon}</div>
                <div style={{fontSize:10,marginTop:3,fontWeight:view===tab.id?900:600}}>{tab.label}</div>
              </button>
            ))}
          </div>
        </div>
      )}
    </>
  );

  function BudgetView(){
    return(
      <div style={{padding:isTablet?"24px":"8px 16px"}}>
        <div className="tap-btn" onClick={()=>setShowIncome(v=>!v)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:t.bgCard,borderRadius:16,padding:"12px 18px",marginBottom:10,border:`1px solid ${t.borderCard}`,boxShadow:t.shadow,cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>💰</span>
            <div>
              <div style={{fontSize:11,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Monthly Income</div>
              <div style={{fontSize:16,fontWeight:900,color:periodIncome>0?t.accent:t.textFaint}}>{periodIncome>0?fmtDec(income.monthly):"Tap to set income"}</div>
            </div>
          </div>
          <span style={{fontSize:13,color:t.textMuted,fontWeight:700}}>{showIncome?"▲":"▼"}</span>
        </div>
        {showIncome&&(
          <div style={{background:t.bgCard,borderRadius:16,padding:18,marginBottom:10,border:`1px solid ${t.accent}44`,animation:"slideUp 0.25s ease"}}>
            <Lbl t={t}>Combined Monthly Take-Home ($)</Lbl>
            <input type="number" inputMode="decimal" placeholder="e.g. 5000" value={incEdit} onChange={e=>setIncEdit(e.target.value)} autoFocus style={{...IS,fontSize:24,fontWeight:900,textAlign:"center",color:t.accent,letterSpacing:-0.5,marginBottom:10}}/>
            <button className="tap-btn" onClick={handleSaveIncome} style={{width:"100%",padding:14,background:t.accentGrad,color:t.accentText,border:"none",borderRadius:14,fontSize:15,fontFamily:"'Nunito',sans-serif",fontWeight:900,cursor:"pointer",marginBottom:8}}>Save Income</button>
            <button className="tap-btn" onClick={()=>setShowIncome(false)} style={{width:"100%",padding:12,background:t.bgPill,border:`1px solid ${t.borderCard}`,borderRadius:14,fontSize:14,fontFamily:"'Nunito',sans-serif",cursor:"pointer",color:t.textMuted}}>Cancel</button>
          </div>
        )}
        {periodIncome>0&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div style={{background:t.bgCard,borderRadius:16,padding:"14px 16px",border:`1px solid ${actualSavings>=0?t.accent+"33":t.over+"33"}`}}>
              <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Actual Savings</div>
              <div style={{fontSize:isTablet?20:18,fontWeight:900,color:actualSavings>=0?t.accent:t.over}}>{fmtDec(Math.abs(actualSavings))}</div>
              <div style={{fontSize:11,color:actualSavings>=0?t.accent:t.over,fontWeight:700,marginTop:2}}>{actualSavings>=0?Math.round(savingsPct*100)+"% of income":"overspent"}</div>
              <FillBarSimple pct={savingsPct} color={actualSavings>=0?t.accent:t.over} t={t}/>
            </div>
            <div style={{background:t.bgCard,borderRadius:16,padding:"14px 16px",border:`1px solid ${t.borderCard}`}}>
              <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Budgeted Savings</div>
              <div style={{fontSize:isTablet?20:18,fontWeight:900,color:budgetedSavings>=0?t.remaining:t.over}}>{fmtDec(Math.abs(budgetedSavings))}</div>
              <div style={{fontSize:11,color:t.textMuted,fontWeight:700,marginTop:2}}>{budgetedSavings>=0?Math.round((budgetedSavings/periodIncome)*100)+"% planned":"budget > income"}</div>
              <FillBarSimple pct={Math.max(0,budgetedSavings/periodIncome)} color={budgetedSavings>=0?t.remaining:t.over} t={t}/>
            </div>
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:isTablet?24:16,background:t.bgSummary,borderRadius:isTablet?24:20,padding:isTablet?"24px 28px":"16px 18px",marginBottom:isTablet?20:12,border:`1px solid ${t.borderCard}`,boxShadow:t.shadow}}>
          <SummaryRing spent={totalSpent} total={periodIncome||totalBudget} t={t} size={isTablet?150:128}/>
          <div style={{flex:1}}>
            {periodIncome>0&&<StatRow label="Income" value={fmtDec(periodIncome)} color={t.accent} t={t}/>}
            <StatRow label="Budgeted" value={fmt(totalBudget)} color={t.textSub} t={t}/>
            <StatRow label="Spent" value={fmtDec(totalSpent)} color={totalSpent>totalBudget?t.over:t.accent} big t={t}/>
            <StatRow label="Remaining" value={fmtDec(remaining)} color={remaining<0?t.over:t.remaining} t={t}/>
            <StatRow label="Entries" value={periodExpenses.length+" items"} color={t.textFaint} t={t}/>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:isTablet?"1fr 1fr":"1fr",gap:isTablet?14:10}}>
          {categories.map((cat,i)=>(
            <div key={cat.id} style={{animation:"slideUp 0.35s ease both",animationDelay:i*0.03+"s"}}>
              <CatCard cat={cat} spent={spentFor(cat.id)} t={t} isTablet={isTablet} onClick={()=>{setAddForm(f=>({...f,catId:cat.id}));setView("add");}}/>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function AddView(){
    const inputBase={width:"100%",background:t.bgInput,border:`1px solid ${t.borderInput}`,borderRadius:12,padding:"11px 14px",color:t.text,fontWeight:700,outline:"none",display:"block",fontFamily:"'Nunito',sans-serif"};
    if(isTablet) return(
      <div style={{padding:"24px"}}>
        <div style={{background:t.bgCard,borderRadius:24,padding:32,border:`1px solid ${t.borderCard}`,animation:"slideUp 0.3s ease",maxWidth:560,margin:"0 auto"}}>
          <h2 style={{fontSize:24,fontWeight:900,marginBottom:24,color:t.text}}>Add Expense</h2>
          <Lbl t={t}>Amount ($)</Lbl>
          <input type="number" inputMode="decimal" placeholder="0.00" value={addForm.amount} onChange={e=>setAddForm(f=>({...f,amount:e.target.value}))} autoFocus style={{...IS,fontSize:40,fontWeight:900,textAlign:"center",color:t.accent,letterSpacing:-1}}/>
          <Lbl t={t}>Category</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>
            {categories.map(cat=><button key={cat.id} className="tap-btn" onClick={()=>setAddForm(f=>({...f,catId:cat.id}))} style={{border:`2px solid ${addForm.catId===cat.id?cat.color:t.borderCard}`,background:addForm.catId===cat.id?cat.color+"22":t.bgPill,borderRadius:20,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:800,fontFamily:"inherit",color:addForm.catId===cat.id?cat.color:t.textMuted}}>{cat.emoji} {cat.name}</button>)}
          </div>
          <Lbl t={t}>Note</Lbl>
          <input type="text" placeholder="What was this for?" value={addForm.note} onChange={e=>setAddForm(f=>({...f,note:e.target.value}))} style={IS}/>
          <Lbl t={t}>Date</Lbl>
          <input type="date" value={addForm.date} onChange={e=>setAddForm(f=>({...f,date:e.target.value}))} style={{...IS,marginBottom:28,colorScheme:isDark?"dark":"light"}}/>
          <button className="tap-btn" onClick={handleAdd} disabled={!canSave} style={{width:"100%",padding:18,background:t.accentGrad,color:t.accentText,border:"none",borderRadius:14,fontSize:16,fontFamily:"'Nunito',sans-serif",fontWeight:900,cursor:"pointer",opacity:canSave?1:0.4}}>Save Expense ✓</button>
        </div>
      </div>
    );
    return(
      <div style={{padding:"10px 16px 24px",animation:"slideUp 0.25s ease"}}>
        <div style={{background:t.bgCard,borderRadius:18,padding:"14px 18px",marginBottom:10,border:`1px solid ${selCat?selCat.color+"44":t.borderCard}`}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {selCat&&<div style={{width:42,height:42,borderRadius:12,background:selCat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{selCat.emoji}</div>}
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,marginBottom:4}}>{selCat?selCat.name:"Select a category below"}</div>
              <input type="number" inputMode="decimal" placeholder="0.00" value={addForm.amount} onChange={e=>setAddForm(f=>({...f,amount:e.target.value}))} autoFocus style={{...inputBase,fontSize:34,fontWeight:900,color:t.accent,letterSpacing:-1,padding:0,background:"transparent",border:"none",width:"100%"}}/>
            </div>
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6,paddingLeft:2}}>Category</div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
            {categories.map(cat=>{const sel=addForm.catId===cat.id;return(
              <button key={cat.id} className="tap-btn cat-scroll" onClick={()=>setAddForm(f=>({...f,catId:cat.id}))} style={{flexShrink:0,display:"flex",alignItems:"center",gap:6,border:`2px solid ${sel?cat.color:t.borderCard}`,background:sel?cat.color+"22":t.bgCard,borderRadius:14,padding:"8px 12px",cursor:"pointer",fontFamily:"inherit",color:sel?cat.color:t.textMuted,fontWeight:800,fontSize:13}}>
                <span style={{fontSize:17}}>{cat.emoji}</span><span>{cat.name}</span>
              </button>
            );})}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,marginBottom:14}}>
          <div>
            <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>Note</div>
            <input type="text" placeholder="What was this for?" value={addForm.note} onChange={e=>setAddForm(f=>({...f,note:e.target.value}))} style={{...inputBase,fontSize:14}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>Date</div>
            <input type="date" value={addForm.date} onChange={e=>setAddForm(f=>({...f,date:e.target.value}))} style={{...inputBase,fontSize:13,colorScheme:isDark?"dark":"light",width:"auto"}}/>
          </div>
        </div>
        <button className="tap-btn" onClick={handleAdd} disabled={!canSave} style={{width:"100%",padding:16,background:t.accentGrad,color:t.accentText,border:"none",borderRadius:14,fontSize:16,fontFamily:"'Nunito',sans-serif",fontWeight:900,cursor:"pointer",marginBottom:10,opacity:canSave?1:0.4}}>Save Expense ✓</button>
        <button className="tap-btn" onClick={()=>setView("budget")} style={{width:"100%",padding:13,background:t.bgPill,border:`1px solid ${t.borderCard}`,borderRadius:14,fontSize:14,fontFamily:"'Nunito',sans-serif",cursor:"pointer",color:t.textMuted}}>Cancel</button>
      </div>
    );
  }

  function HistoryView(){
    return(
      <div style={{padding:isTablet?"24px":"8px 16px",animation:"slideUp 0.3s ease"}}>
        {periodExpenses.length===0?(
          <div style={{textAlign:"center",padding:"80px 0",color:t.textMuted,fontSize:14}}><div style={{fontSize:48,marginBottom:16}}>🌿</div>No expenses this period</div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:isTablet?"1fr 1fr":"1fr",gap:isTablet?10:8}}>
            {periodExpenses.map(exp=>{
              const cat=categories.find(c=>c.id===exp.catId);
              return(
                <div key={exp.id} style={{background:t.bgCard,borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,border:`1px solid ${t.borderCard}`}}>
                  <div style={{width:36,height:36,borderRadius:10,background:(cat?.color||"#888")+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat?.emoji||"📦"}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:t.text}}>{exp.note||cat?.name||"Expense"}</div>
                    <div style={{fontSize:11,color:t.textMuted,marginTop:2}}>{cat?.name} · {new Date(exp.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                  </div>
                  <span style={{fontWeight:900,fontSize:15,color:cat?.color||t.accent,flexShrink:0}}>{fmtDec(exp.amount)}</span>
                  <button className="tap-btn" onClick={()=>handleDel(exp.id)} style={{background:t.over+"18",border:"none",borderRadius:8,padding:"5px 9px",color:t.over,cursor:"pointer",fontSize:13,flexShrink:0}}>✕</button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  function ManageView(){
    return(
      <div style={{padding:isTablet?"24px":"8px 16px",animation:"slideUp 0.3s ease"}}>
        <div style={{maxWidth:isTablet?680:9999,margin:isTablet?"0 auto":0}}>
          <div style={{fontSize:12,color:t.textMuted,marginBottom:12}}>Use ↑↓ to reorder · tap Edit to change</div>
          <div style={{display:"grid",gridTemplateColumns:isTablet?"1fr 1fr":"1fr",gap:isTablet?10:8,marginBottom:16}}>
            {categories.map((cat,i)=>(
              <div key={cat.id} style={{background:t.bgCard,borderRadius:16,padding:14,border:`1px solid ${t.borderCard}`}}>
                {editCat?.id===cat.id?(
                  <div>
                    <div style={{display:"flex",gap:10,marginBottom:10}}>
                      <input value={editCat.emoji} onChange={e=>setEditCat(f=>({...f,emoji:e.target.value}))} style={{...IS,width:52,textAlign:"center",fontSize:22,padding:8,marginBottom:0}} maxLength={2}/>
                      <input value={editCat.name} onChange={e=>setEditCat(f=>({...f,name:e.target.value}))} style={{...IS,flex:1,marginBottom:0}} placeholder="Name"/>
                    </div>
                    <div style={{display:"flex",gap:10,marginBottom:12}}>
                      <div style={{flex:1}}><Lbl t={t}>Budget ($)</Lbl><input type="number" value={editCat.budget} onChange={e=>setEditCat(f=>({...f,budget:e.target.value}))} style={{...IS,marginBottom:0}}/></div>
                      <div style={{flex:"0 0 72px"}}><Lbl t={t}>Color</Lbl><input type="color" value={editCat.color} onChange={e=>setEditCat(f=>({...f,color:e.target.value}))} style={{...IS,padding:4,height:46,cursor:"pointer",marginBottom:0}}/></div>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button className="tap-btn" onClick={handleSaveEdit} style={{flex:1,padding:11,background:t.accentGrad,color:t.accentText,border:"none",borderRadius:14,fontSize:14,fontFamily:"'Nunito',sans-serif",fontWeight:900,cursor:"pointer"}}>Save ✓</button>
                      <button className="tap-btn" onClick={()=>setEditCat(null)} style={{flex:1,padding:11,background:t.bgPill,border:`1px solid ${t.borderCard}`,borderRadius:14,fontSize:14,fontFamily:"'Nunito',sans-serif",cursor:"pointer",color:t.textMuted}}>Cancel</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
                      <button onClick={()=>moveCategory(i,-1)} disabled={i===0} style={{width:30,height:30,borderRadius:8,border:"none",cursor:i===0?"default":"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",background:i===0?t.fillBg:t.bgPill,color:i===0?t.textFaint:t.textSub}}>↑</button>
                      <button onClick={()=>moveCategory(i,1)} disabled={i===categories.length-1} style={{width:30,height:30,borderRadius:8,border:"none",cursor:i===categories.length-1?"default":"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",background:i===categories.length-1?t.fillBg:t.bgPill,color:i===categories.length-1?t.textFaint:t.textSub}}>↓</button>
                    </div>
                    <div style={{width:36,height:36,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:800,fontSize:14,color:t.text}}>{cat.name}</div>
                      <div style={{fontSize:12,color:t.textMuted}}>{fmt(cat.budget)}</div>
                    </div>
                    <button className="tap-btn" onClick={()=>setEditCat({...cat})} style={{background:t.bgPill,border:`1px solid ${t.borderCard}`,borderRadius:8,padding:"6px 12px",color:t.textSub,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:800,flexShrink:0}}>Edit</button>
                    <button className="tap-btn" onClick={()=>handleDelCat(cat.id)} style={{background:t.over+"18",border:"none",borderRadius:8,padding:"6px 10px",color:t.over,cursor:"pointer",fontSize:14,flexShrink:0}}>✕</button>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div style={{background:t.bgCard,borderRadius:16,padding:18,border:`1px dashed ${t.borderDash}`,marginBottom:14}}>
            <h3 style={{fontSize:13,fontWeight:800,color:t.textMuted,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>＋ New Category</h3>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <div style={{flexShrink:0}}><Lbl t={t}>Emoji</Lbl><input value={newCat.emoji} onChange={e=>setNewCat(f=>({...f,emoji:e.target.value}))} style={{...IS,width:56,textAlign:"center",fontSize:22,padding:8,marginBottom:0}} maxLength={2}/></div>
              <div style={{flex:1}}><Lbl t={t}>Name</Lbl><input value={newCat.name} onChange={e=>setNewCat(f=>({...f,name:e.target.value}))} style={{...IS,marginBottom:0}} placeholder="e.g. Rent"/></div>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <div style={{flex:1}}><Lbl t={t}>Budget ($)</Lbl><input type="number" value={newCat.budget} onChange={e=>setNewCat(f=>({...f,budget:e.target.value}))} style={{...IS,marginBottom:0}} placeholder="e.g. 500"/></div>
              <div style={{flex:"0 0 72px"}}><Lbl t={t}>Color</Lbl><input type="color" value={newCat.color} onChange={e=>setNewCat(f=>({...f,color:e.target.value}))} style={{...IS,padding:4,height:46,cursor:"pointer",marginBottom:0}}/></div>
            </div>
            <button className="tap-btn" onClick={handleAddCat} style={{width:"100%",padding:14,background:t.accentGrad,color:t.accentText,border:"none",borderRadius:14,fontSize:15,fontFamily:"'Nunito',sans-serif",fontWeight:900,cursor:"pointer"}}>Add Category</button>
          </div>
          <div style={{background:t.bgCard,borderRadius:16,padding:18,border:`1px solid ${t.borderCard}`}}>
            <h3 style={{fontSize:13,fontWeight:800,color:t.textMuted,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Backup & Restore</h3>
            <div style={{display:isTablet?"flex":"block",gap:10}}>
              <button className="tap-btn" onClick={exportData} style={{width:"100%",padding:14,background:t.accentGrad,color:t.accentText,border:"none",borderRadius:14,fontSize:14,fontFamily:"'Nunito',sans-serif",fontWeight:900,cursor:"pointer",marginBottom:isTablet?0:8}}>⬇ Download Backup</button>
              <label className="tap-btn" style={{width:"100%",padding:13,background:t.bgPill,border:`1px solid ${t.borderCard}`,borderRadius:14,fontSize:14,fontFamily:"'Nunito',sans-serif",cursor:"pointer",color:t.textMuted,display:"block",textAlign:"center"}}>
                ⬆ Import Backup<input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
              </label>
            </div>
          </div>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
