<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spend Together</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #141820; }
    #root { height: 100%; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var h = React.createElement;
var useState = React.useState;

function App() {
var s = useState(0);
var count = s[0], setCount = s[1];

return h(‘div’, {style:{padding:“40px”, fontFamily:“sans-serif”}},
h(‘h1’, {style:{color:”#52D9A4”, fontSize:32, marginBottom:20}}, “Spend Together”),
h(‘p’, {style:{color:“white”, fontSize:18, marginBottom:20}}, “Count: “ + count),
h(‘button’, {
onClick: function(){ setCount(count+1); },
style:{padding:“14px 28px”, background:”#52D9A4”, border:“none”, borderRadius:10, fontSize:16, fontWeight:800, cursor:“pointer”}
}, “Tap me +1”)
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(h(App));
</script>

</body>
</html>
