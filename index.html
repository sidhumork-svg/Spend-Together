function fillColor(pct,base,t){return pct>=1?t.over:pct>=0.85?t.near:base;}

function FillBar(props){
  var pct=props.pct,color=props.color,t=props.t;
  var clamp=Math.min(pct,1),fc=fillColor(pct,color,t);
  return (
    <div style={{position:"relative",height:10,background:t.fillBg,borderRadius:99,overflow:"hidden"}}>
      <div style={{position:"absolute",left:0,top:0,height:"100%",width:(clamp*100)+"%",
        background:pct>=1?"repeating-linear-gradient(45deg,"+fc+" 0,"+fc+" 6px,"+t.over+"99 6px,"+t.over+"99 12px)":fc,
        borderRadius:99,transition:"width 0.7s"}}/>
    </div>
  );
}

function SummaryRing(props){
  var spent=props.spent,total=props.total,t=props.t,size=props.size||128;
  var pct=total>0?Math.min(spent/total,1):0;
  var r=size*0.42,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  var fc=pct>=1?t.over:pct>=0.85?t.near:t.accent;
  var fs=size<110?11:15;
  return(
    <svg width={size} height={size} style={{display:"block",flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={t.fillBg} strokeWidth={size*0.078}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={fc} strokeWidth={size*0.078}
        strokeDasharray={(pct*circ)+" "+circ} strokeLinecap="round"
        transform={"rotate(-90 "+cx+" "+cy+")"}/>
      <text x={cx} y={cy-fs*0.55} textAnchor="middle" fill={t.text} fontSize={fs} fontWeight={800} fontFamily="Nunito,sans-serif">{fmt(spent)}</text>
      <text x={cx} y={cy+fs*0.65} textAnchor="middle" fill={t.textMuted} fontSize={fs-4} fontFamily="Nunito,sans-serif">{"of "+fmt(total)}</text>
      <text x={cx} y={cy+fs*1.85} textAnchor="middle" fill={fc} fontSize={fs-2} fontWeight={800} fontFamily="Nunito,sans-serif">{Math.round(pct*100)+"%"}</text>
    </svg>
  );
}

                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:11,color:t.textMuted}}>Budgeted</span><span style={{fontSize:13,fontWeight:700,color:t.textSub}}>{fmt(totalBudget)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:11,color:t.textMuted}}>Spent</span><span style={{fontSize:16,fontWeight:900,color:totalSpent>totalBudget?t.over:t.accent}}>{fmtDec(totalSpent)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:11,color:t.textMuted}}>Remaining</span><span style={{fontSize:13,fontWeight:700,color:remaining<0?t.over:t.remaining}}>{fmtDec(remaining)}</span></div>
                {actualSavings!==null&&<div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:t.textMuted}}>Savings</span><span style={{fontSize:13,fontWeight:700,color:actualSavings>=0?t.accent:t.over}}>{fmtDec(actualSavings)}</span></div>}
              </div>
            </div>
            {/* Category cards */}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {categories.map(function(cat){
                var spent=spentFor(cat.id),pct=cat.budget>0?spent/cat.budget:0,over=pct>=1,near=pct>=0.85&&!over;
                return(
                  <div key={cat.id} className="cat-card" onClick={function(){setAddForm(function(f){return Object.assign({},f,{catId:cat.id});});setView("add");}} style={{background:t.bgCard,borderRadius:16,padding:"14px 16px",border:"1px solid "+(over?t.over+"44":near?t.near+"33":t.borderCard),cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:36,height:36,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{cat.emoji}</div>
                        <div>
                          <div style={{fontWeight:800,fontSize:14,color:t.text}}>{cat.name}</div>
                          <div style={{fontSize:11,color:t.textMuted}}>Budget: {fmt(cat.budget)}</div>
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontWeight:900,fontSize:16,color:fillColor(pct,cat.color,t)}}>{fmtDec(spent)}</div>
                        <div style={{fontSize:11,fontWeight:700,color:over?t.over:near?t.near:t.textFaint}}>{over?"+"+fmtDec(spent-cat.budget)+" over":fmt(cat.budget-spent)+" left"}</div>
                      </div>
                    </div>
                    <FillBar pct={pct} color={cat.color} t={t}/>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {view==="add"&&(
          <div style={{padding:"10px 16px 24px"}}>
            <div style={{background:t.bgCard,borderRadius:18,padding:"14px 18px",marginBottom:10,border:"1px solid "+(selCat?selCat.color+"44":t.borderCard)}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {selCat&&<div style={{width:42,height:42,borderRadius:12,background:selCat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{selCat.emoji}</div>}
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,marginBottom:4}}>{selCat?selCat.name:"Select a category below"}</div>
                  <input type="number" inputMode="decimal" placeholder="0.00" value={addForm.amount} onChange={function(e){setAddForm(function(f){return Object.assign({},f,{amount:e.target.value});});}} autoFocus style={{fontSize:34,fontWeight:900,color:t.accent,padding:0,background:"transparent",border:"none",width:"100%",outline:"none",fontFamily:"Nunito,sans-serif"}}/>
                </div>
              </div>
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>Category</div>
              <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,WebkitOverflowScrolling:"touch"}}>
                {categories.map(function(cat){var sel=addForm.catId===cat.id;return(
                  <button key={cat.id} className="tap-btn" onClick={function(){setAddForm(function(f){return Object.assign({},f,{catId:cat.id});});}} style={{flexShrink:0,display:"flex",alignItems:"center",gap:6,border:"2px solid "+(sel?cat.color:t.borderCard),background:sel?cat.color+"22":t.bgCard,borderRadius:14,padding:"8px 12px",cursor:"pointer",fontFamily:"inherit",color:sel?cat.color:t.textMuted,fontWeight:800,fontSize:13}}>
                    <span style={{fontSize:17}}>{cat.emoji}</span><span>{cat.name}</span>
                  </button>
                );})}
              </div>
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>Note</div>
              <input type="text" placeholder="What was this for?" value={addForm.note} onChange={function(e){setAddForm(function(f){return Object.assign({},f,{note:e.target.value});});}} style={{...IS,fontSize:14,marginBottom:0}}/>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>Date</div>
              <input type="date" value={addForm.date} onChange={function(e){setAddForm(function(f){return Object.assign({},f,{date:e.target.value});});}} style={{...IS,marginBottom:0,colorScheme:isDark?"dark":"light"}}/>
            </div>
            <button className="tap-btn" onClick={handleAdd} disabled={!canSave} style={{width:"100%",padding:16,background:t.accentGrad,color:t.accentText,border:"none",borderRadius:14,fontSize:16,fontFamily:"Nunito,sans-serif",fontWeight:900,cursor:"pointer",marginBottom:10,opacity:canSave?1:0.4}}>Save Expense ✓</button>
            <button className="tap-btn" onClick={function(){setView("budget");}} style={{width:"100%",padding:13,background:t.bgPill,border:"1px solid "+t.borderCard,borderRadius:14,fontSize:14,fontFamily:"Nunito,sans-serif",cursor:"pointer",color:t.textMuted}}>Cancel</button>
          </div>
        )}

        {view==="history"&&(
          <div style={{padding:"8px 16px 16px"}}>
            {periodExpenses.length===0?(
              <div style={{textAlign:"center",padding:"80px 0",color:t.textMuted}}><div style={{fontSize:48,marginBottom:16}}>🌿</div>No expenses this period</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {periodExpenses.map(function(exp){
                  var cat=categories.find(function(c){return c.id===exp.catId;});
                  return(
                    <div key={exp.id} style={{background:t.bgCard,borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,border:"1px solid "+t.borderCard}}>
                      <div style={{width:36,height:36,borderRadius:10,background:(cat&&cat.color||"#888")+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat&&cat.emoji||"📦"}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:t.text}}>{exp.note||cat&&cat.name||"Expense"}</div>
                        <div style={{fontSize:11,color:t.textMuted,marginTop:2}}>{cat&&cat.name} · {new Date(exp.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                      </div>
                      <span style={{fontWeight:900,fontSize:15,color:cat&&cat.color||t.accent,flexShrink:0}}>{fmtDec(exp.amount)}</span>
                      <button className="tap-btn" onClick={function(){handleDel(exp.id);}} style={{background:t.over+"18",border:"none",borderRadius:8,padding:"5px 9px",color:t.over,cursor:"pointer",fontSize:13,flexShrink:0}}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {view==="manage"&&(
          <div style={{padding:"8px 16px 24px"}}>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {categories.map(function(cat,i){return(
                <div key={cat.id} style={{background:t.bgCard,borderRadius:16,padding:14,border:"1px solid "+t.borderCard}}>
                  {editCat&&editCat.id===cat.id?(
                    <div>
                      <div style={{display:"flex",gap:10,marginBottom:10}}>
                        <input value={editCat.emoji} onChange={function(e){setEditCat(function(f){return Object.assign({},f,{emoji:e.target.value});});}} style={{...IS,width:52,textAlign:"center",fontSize:22,padding:8,marginBottom:0}} maxLength={2}/>
                        <input value={editCat.name} onChange={function(e){setEditCat(function(f){return Object.assign({},f,{name:e.target.value});});}} style={{...IS,flex:1,marginBottom:0}} placeholder="Name"/>
                      </div>
                      <input type="number" value={editCat.budget} onChange={function(e){setEditCat(function(f){return Object.assign({},f,{budget:e.target.value});});}} style={IS} placeholder="Budget ($)"/>
                      <div style={{display:"flex",gap:8}}>
                        <button className="tap-btn" onClick={handleSaveEdit} style={{flex:1,padding:11,background:t.accentGrad,color:t.accentText,border:"none",borderRadius:14,fontSize:14,fontFamily:"Nunito,sans-serif",fontWeight:900,cursor:"pointer"}}>Save ✓</button>
                        <button className="tap-btn" onClick={function(){setEditCat(null);}} style={{flex:1,padding:11,background:t.bgPill,border:"1px solid "+t.borderCard,borderRadius:14,fontSize:14,fontFamily:"Nunito,sans-serif",cursor:"pointer",color:t.textMuted}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:36,height:36,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat.emoji}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:800,fontSize:14,color:t.text}}>{cat.name}</div>
                        <div style={{fontSize:12,color:t.textMuted}}>{fmt(cat.budget)}</div>
                      </div>
                      <button className="tap-btn" onClick={function(){setEditCat(Object.assign({},cat));}} style={{background:t.bgPill,border:"1px solid "+t.borderCard,borderRadius:8,padding:"6px 12px",color:t.textSub,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:800}}>Edit</button>
                      <button className="tap-btn" onClick={function(){handleDelCat(cat.id);}} style={{background:t.over+"18",border:"none",borderRadius:8,padding:"6px 10px",color:t.over,cursor:"pointer",fontSize:14}}>✕</button>
                    </div>
                  )}
                </div>
              );})}
            </div>
            <div style={{background:t.bgCard,borderRadius:16,padding:18,border:"1px dashed "+t.borderDash}}>
              <div style={{fontSize:12,color:t.textMuted,fontWeight:800,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>＋ New Category</div>
              <div style={{display:"flex",gap:10,marginBottom:12}}>
                <input value={newCat.emoji} onChange={function(e){setNewCat(function(f){return Object.assign({},f,{emoji:e.target.value});});}} style={{...IS,width:56,textAlign:"center",fontSize:22,padding:8,marginBottom:0}} maxLength={2}/>
                <input value={newCat.name} onChange={function(e){setNewCat(function(f){return Object.assign({},f,{name:e.target.value});});}} style={{...IS,flex:1,marginBottom:0}} placeholder="Category name"/>
              </div>
              <input type="number" value={newCat.budget} onChange={function(e){setNewCat(function(f){return Object.assign({},f,{budget:e.target.value});});}} style={IS} placeholder="Budget ($)"/>
              <button className="tap-btn" onClick={handleAddCat} style={{width:"100%",padding:14,background:t.accentGrad,color:t.accentText,border:"none",borderRadius:14,fontSize:15,fontFamily:"Nunito,sans-serif",fontWeight:900,cursor:"pointer"}}>Add Category</button>
            </div>
          </div>
        )}

      </div>

      {/* Bottom nav */}
      <div style={{flexShrink:0,background:t.bgNav,borderTop:"1px solid "+t.borderNav,display:"flex",paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {NAV_ITEMS.map(function(tab){return(
          <button key={tab.id} className="tap-btn" onClick={function(){setView(tab.id);}} style={{flex:1,border:"none",background:"none",padding:"12px 0 10px",cursor:"pointer",color:view===tab.id?t.accent:t.textNav,fontFamily:"inherit"}}>
            <div style={{fontSize:tab.id==="add"?22:18}}>{tab.icon}</div>
            <div style={{fontSize:10,marginTop:3,fontWeight:view===tab.id?900:600}}>{tab.label}</div>
          </button>
        );})}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
