<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test</title>
</head>
<body style="background:red;">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
function App() {
  var s = React.useState(0);
  var count = s[0], setCount = s[1];
  return React.createElement('div', {style:{padding:20}},
    React.createElement('h1', {style:{color:"white"}}, "Count: " + count),
    React.createElement('button', {onClick: function(){ setCount(count+1); }}, "Tap me")
  );
}
try {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
} catch(e) {
  document.body.innerHTML = '<p style="color:yellow;padding:20px;">ERROR: ' + e.message + '</p>';
}
</script>
</body>
</html>
