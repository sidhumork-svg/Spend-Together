<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spend Together</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: green; }
    #root { height: 100%; display: flex; flex-direction: column; }
    .sa { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var h = React.createElement;

function App() {
var s = React.useState(“budget”);
var view = s[0], setView = s[1];

return h(‘div’, {style:{display:“flex”,flexDirection:“column”,height:“100%”,fontFamily:“sans-serif”,color:“white”}},
h(‘div’, {style:{padding:“20px 16px”,background:”#1D2330”,flexShrink:0}},
h(‘div’, {style:{fontSize:22,fontWeight:700,color:“white”}}, “Spend Together”)
),
h(‘div’, {className:“sa”, style:{flex:1,minHeight:0,padding:16,background:”#141820”}},
h(‘div’, {style:{background:”#52D9A422”,borderRadius:16,padding:20,border:“1px solid #52D9A444”}},
h(‘div’, {style:{fontWeight:800,fontSize:16,color:”#52D9A4”}}, “View: “ + view)
)
),
h(‘div’, {style:{flexShrink:0,background:”#1A1F2E”,borderTop:“1px solid rgba(255,255,255,0.07)”,display:“flex”}},
[“Budget”,“Add”,“History”,“Manage”].map(function(tab) {
return h(‘button’, {
key: tab,
onClick: function(){ setView(tab.toLowerCase()); },
style:{flex:1,border:“none”,background:“none”,padding:“12px 0”,cursor:“pointer”,color:”#52D9A4”,fontFamily:“inherit”,fontSize:11}
}, tab);
})
)
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(h(App));
</script>

</body>
</html>
