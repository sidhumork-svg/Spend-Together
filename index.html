function getSunTimes(lat,lng){
  var now=new Date(),start=new Date(now.getFullYear(),0,0);
  var dayOfYear=Math.floor((now-start)/(1000*60*60*24));
  var B=(360/365)*(dayOfYear-81)*(Math.PI/180);
  var EoT=9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);
  var TC=4*lng+EoT,solarNoon=720-TC;
  var latRad=lat*(Math.PI/180),decl=23.45*Math.sin(B)*(Math.PI/180);
  var cosHA=(Math.cos(90.833*Math.PI/180)-Math.sin(latRad)*Math.sin(decl))/(Math.cos(latRad)*Math.cos(decl));
  if(cosHA<-1||cosHA>1)return{sunrise:6*60,sunset:19*60};
  var HA=Math.acos(cosHA)*(180/Math.PI),offset=now.getTimezoneOffset();
  return{sunrise:solarNoon-HA*4-offset,sunset:solarNoon+HA*4-offset};
}
var _sunCache=null,_sunCacheDate=null;
function isDaytime(){
  var now=new Date(),mins=now.getHours()*60+now.getMinutes(),today=now.toDateString();

  if(S.cachedLat!==null){_sunCache=getSunTimes(S.cachedLat,S.cachedLng);_sunCacheDate=today;return mins>=_sunCache.sunrise&&mins<_sunCache.sunset;}
  return now.getHours()>=6&&now.getHours()<19;
}

function totalWeeksInYear(y){var d=new Date(y,11,28);return getISOWeek(d).week;}
function getWeekRange(week,year){
  var simple=new Date(year,0,1+((week-1)*7));

  var monday=new Date(simple);monday.setDate(simple.getDate()-dow+1);
  var sunday=new Date(monday);sunday.setDate(monday.getDate()+6);

  return f(monday)+" - "+f(sunday);
}

function shiftPeriod(dir){

function makeSVGRing(spent,total,t,size){
  size=size||128;
  var pct=total>0?Math.min(spent/total,1):0;
  var r=size*0.42,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  var fs=size<110?11:15;
  var sw=Number((size*0.078).toFixed(4));
  var overallColor=pct>=1?t.over:pct>=0.85?t.near:t.accent;
  var svg="<svg width='"+size+"' height='"+size+"' viewBox='0 0 "+size+" "+size+"' style='display:block;flex-shrink:0;overflow:visible'>";
  svg+="<circle cx='"+cx+"' cy='"+cy+"' r='"+r+"' fill='none' stroke='"+t.fillBg+"' stroke-width='"+sw+"'/>";
  var cats=S.cats;var offsetLen=0;
  for(var i=0;i<cats.length;i++){
    var catSpent=spentFor(cats[i].id);
    if(catSpent<=0)continue;
    var catPct=total>0?catSpent/total:0;
    var segLen=Number((catPct*circ).toFixed(4));
    var gap=Number((circ-segLen).toFixed(4));
    var dashOffset=Number((-offsetLen).toFixed(4));
    svg+="<circle cx='"+cx+"' cy='"+cy+"' r='"+r+"' fill='none' stroke='"+cats[i].color+"' stroke-width='"+sw+"' stroke-dasharray='"+segLen+" "+gap+"' stroke-dashoffset='"+dashOffset+"' stroke-linecap='butt' transform='rotate(-90,"+cx+","+cy+")'></circle>";
    offsetLen+=segLen;
  }
  svg+="<text x='"+cx+"' y='"+(cy-fs*0.55)+"' text-anchor='middle' fill='"+t.text+"' font-size='"+fs+"' font-weight='800' font-family='Nunito,sans-serif'>"+fmt(spent)+"</text>";
  svg+="<text x='"+cx+"' y='"+(cy+fs*0.65)+"' text-anchor='middle' fill='"+t.textMuted+"' font-size='"+(fs-4)+"' font-family='Nunito,sans-serif'>of "+fmt(total)+"</text>";
  svg+="<text x='"+cx+"' y='"+(cy+fs*1.85)+"' text-anchor='middle' fill='"+overallColor+"' font-size='"+(fs-2)+"' font-weight='800' font-family='Nunito,sans-serif'>"+Math.round(pct*100)+"%</text>";
  svg+="</svg>";
  return svg;
}

      if(act==="view")setView(val);

      else if(act==="showaddform"){S.showAddInDetail=true;render();}

      else if(act==="savedetailexp")handleSaveDetailExp();

      else if(act==="delcat")handleDelCat(val);

        var cat=S.cats.find(function(c){return c.id===val;});
        if(cat)S.editCat={id:cat.id,name:cat.name,emoji:cat.emoji,budget:cat.budget,color:cat.color};
        render();
      }
      else if(act==="canceledit"){S.editCat=null;render();}
      else if(act==="movecat"){
        var parts=val.split(",");
        moveCategory(Number(parts[0]),Number(parts[1]));
      }
      else if(act==="income")toggleIncome();
      else if(act==="saveincome")saveIncome();
      else if(act==="cancelincome"){S.showIncome=false;render();}
      else if(act==="savecat")handleSaveEditCat();
      else if(act==="addcat")handleAddCat();
      else if(act==="theme")cycleTheme();
      else if(act==="emojipick"){S.emojiPicker=val;render();}
      else if(act==="emojiset"){if(S.emojiPicker==="new")S.newCat.emoji=val;else if(S.emojiPicker==="edit"&&S.editCat)S.editCat.emoji=val;S.emojiPicker=null;render();}
      else if(act==="export")exportData();

      else if(act==="catdetail"){S.catDetail=val;S.showAddInDetail=false;S.view="catdetail";render();}
      else if(act==="backtoBudget"){S.catDetail=null;S.showAddInDetail=false;S.view="budget";render();}

});

function toggleIncome(){S.showIncome=!S.showIncome;S.incEdit=S.income&&S.income.monthly>0?String(S.income.monthly):"";render();}
function saveIncome(){var v=parseFloat(S.incEdit)||0;savIncome({monthly:v});S.showIncome=false;showToast(v>0?"Income saved":"Income cleared");render();}
function handleDelExp(id){savExps(S.exps.filter(function(e){return e.id!==id;}));showToast("Deleted");render();}
function handleSaveDetailExp(){
  var amt=parseFloat(S.addDetailForm.amount);
  if(!S.catDetail||!amt||amt<=0){showToast("Enter a valid amount");return;}
  savExps([{id:Date.now(),catId:S.catDetail,amount:amt,note:(S.addDetailForm.note||"").trim(),date:S.addDetailForm.date||new Date().toISOString().split("T")[0]}].concat(S.exps));
  S.addDetailForm={amount:"",note:"",date:new Date().toISOString().split("T")[0]};
  S.showAddInDetail=false;
  showToast("Saved!");render();
}
function handleSaveEditCat(){
  if(!S.editCat||!S.editCat.name||!S.editCat.budget)return;
  savCats(S.cats.map(function(c){return c.id===S.editCat.id?Object.assign({},S.editCat,{budget:parseFloat(S.editCat.budget)}):c;}));
  S.editCat=null;showToast("Saved!");render();
}
function handleAddCat(){
  var name=(S.newCat.name||"").trim(),budget=parseFloat(S.newCat.budget);
  if(!name||!budget||budget<=0){showToast("Fill name & budget");return;}
  savCats(S.cats.concat([{id:"cat_"+Date.now(),name:name,emoji:(S.newCat.emoji||"").trim()||"\uD83D\uDCE6",color:S.newCat.color,budget:budget}]));
  S.newCat={name:"",emoji:"\uD83D\uDCE6",budget:"",color:"#27AE82"};
  showToast(name+" added!");render();
}
function handleDelCat(id){savCats(S.cats.filter(function(c){return c.id!==id;}));showToast("Removed");render();}
function moveCategory(i,dir){
  var ni=i+dir;if(ni<0||ni>=S.cats.length)return;
  var arr=S.cats.slice(),item=arr.splice(i,1)[0];arr.splice(ni,0,item);savCats(arr);render();
}
function cycleTheme(){var next=S.themeMode==="auto"?"light":S.themeMode==="light"?"dark":"auto";savTheme(next);render();}
function exportData(){
  var blob=new Blob([JSON.stringify({categories:S.cats,expenses:S.exps,income:S.income},null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="spend-together-backup.json";a.click();URL.revokeObjectURL(url);showToast("Downloaded!");
}
function handleAddWish(){
  var name=(S.wishForm.name||"").trim(),cost=parseFloat(S.wishForm.cost);
  if(!name||!cost||cost<=0){showToast("Fill name & cost");return;}
  savWish(S.wishlist.concat([{id:Date.now(),name:name,cost:cost,priority:S.wishForm.priority,who:S.wishForm.who,type:S.wishForm.type}]));
  S.wishForm={name:"",cost:"",priority:"Medium",who:"Both",type:"Want"};
  showToast(name+" added!");render();
}
function handleDelWish(id){savWish(S.wishlist.filter(function(w){return w.id!==id;}));showToast("Removed");render();}
