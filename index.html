<html lang="en">
<head>

<body style="background:#141820;color:white;padding:20px;font-family:sans-serif;">

<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById("root").innerHTML = '<div style="background:red;padding:20px;border-radius:10px;margin-bottom:10px"><b>ERROR line '+line+':</b><br>'+msg+'</div>';
};
try {
  // test basic stuff
  var S = { view: "budget", themeMode: "auto" };
  function lsG(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
  var cats = lsG("test_cats", [{id:"a",name:"Test",emoji:"🛒",color:"#27AE82",budget:600}]);
  document.getElementById("root").innerHTML = '<div style="color:#52D9A4;font-size:18px;font-weight:900">✓ JS works! Cats: '+cats.length+'</div><div style="margin-top:10px;font-size:12px;color:rgba(255,255,255,0.4)">If you see this, JavaScript is running fine.</div>';
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="background:red;padding:20px;border-radius:10px">CAUGHT ERROR: '+e.message+'</div>';
}
</script>
