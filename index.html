function getISOWeek(d){
var date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
var day=date.getUTCDay()||7;
date.setUTCDate(date.getUTCDate()+4-day);
var yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
return{week:Math.ceil((((date-yearStart)/86400000)+1)/7),year:date.getUTCFullYear()};
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function getSunTimes(lat,lng){
var now=new Date(),start=new Date(now.getFullYear(),0,0);
var dayOfYear=Math.floor((now-start)/(1000*60*60*24));
var B=(360/365)*(dayOfYear-81)*(Math.PI/180);
var EoT=9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);
var TC=4*lng+EoT,solarNoon=720-TC;
var latRad=lat*(Math.PI/180),decl=23.45*Math.sin(B)*(Math.PI/180);
var cosHA=(Math.cos(90.833*Math.PI/180)-Math.sin(latRad)*Math.sin(decl))/(Math.cos(latRad)*Math.cos(decl));
if(cosHA<-1||cosHA>1)return{sunrise:6*60,sunset:19*60};
var HA=Math.acos(cosHA)*(180/Math.PI),offset=now.getTimezoneOffset();
return{sunrise:solarNoon-HA*4-offset,sunset:solarNoon+HA*4-offset};
}
var _sunCache=null,_sunCacheDate=null;
function isDaytime(){
var now=new Date(),mins=now.getHours()*60+now.getMinutes(),today=now.toDateString();
if(_sunCache&&_sunCacheDate===today)return mins>=_sunCache.sunrise&&mins<_sunCache.sunset;
if(S.cachedLat!==null&&S.cachedLng!==null){_sunCache=getSunTimes(S.cachedLat,S.cachedLng);_sunCacheDate=today;return mins>=_sunCache.sunrise&&mins<_sunCache.sunset;}
return now.getHours()>=6&&now.getHours()<19;
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
function fmt(n){return new Intl.NumberFormat(“en-US”,{style:“currency”,currency:“USD”,maximumFractionDigits:0}).format(n);}
function fmtD(n){return new Intl.NumberFormat(“en-US”,{style:“currency”,currency:“USD”,minimumFractionDigits:2,maximumFractionDigits:2}).format(n);}
function esc(s){return String(s||””).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”);}

// ── PERIOD ────────────────────────────────────────────────────────────────────
function totalWeeksInYear(y){var d=new Date(y,11,28);return getISOWeek(d).week;}
function getWeekRange(week,year){
var simple=new Date(year,0,1+((week-1)*7));
var dow=simple.getDay()||7;
var monday=new Date(simple);monday.setDate(simple.getDate()-dow+1);
var sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
var f=function(d){return d.toLocaleDateString(“en-US”,{month:“short”,day:“numeric”});};
return f(monday)+” – “+f(sunday);
}
function periodLabel(){
if(S.duration===“Monthly”)return MONTHS[S.period.month]+” “+S.period.year;
if(S.duration===“Weekly”)return getWeekRange(S.period.week,S.period.year);
return String(S.period.year);
}
function shiftPeriod(dir){
if(S.duration===“Monthly”){
var m=S.period.month+dir,y=S.period.year;
if(m<0){m=11;y–;}if(m>11){m=0;y++;}
S.period.month=m;S.period.year=y;
} else if(S.duration===“Weekly”){
var w=S.period.week+dir,y2=S.period.year;
if(w<1){y2–;w=totalWeeksInYear(y2);}
else if(w>totalWeeksInYear(y2)){y2++;w=1;}
S.period.week=w;S.period.year=y2;
} else {S.period.year+=dir;}
render();
}
function inPeriod(exp){
var d=new Date(exp.date+“T12:00:00”);
if(S.duration===“Monthly”)return d.getMonth()===S.period.month&&d.getFullYear()===S.period.year;
if(S.duration===“Yearly”)return d.getFullYear()===S.period.year;
if(S.duration===“Weekly”){var r=getISOWeek(d);return r.week===S.period.week&&r.year===S.period.year;}
return true;
}
function getPeriodExps(){return S.exps.filter(inPeriod);}
function spentFor(catId){return getPeriodExps().filter(function(e){return e.catId===catId;}).reduce(function(s,e){return s+e.amount;},0);}
function totalBudget(){return S.cats.reduce(function(s,c){return s+c.budget;},0);}
function totalSpent(){return S.cats.reduce(function(s,c){return s+spentFor(c.id);},0);}
function periodIncome(){
if(!S.income.monthly)return 0;
return S.duration===“Weekly”?S.income.monthly/4.33:S.duration===“Yearly”?S.income.monthly*12:S.income.monthly;
}

// ── SVG RING ──────────────────────────────────────────────────────────────────
function makeSVGRing(spent,total,t,size){
size=size||128;
var pct=total>0?Math.min(spent/total,1):0;
var r=size*0.42,cx=size/2,cy=size/2,circ=2*Math.PI*r;
var fc=pct>=1?t.over:pct>=0.85?t.near:t.accent;
var dash=(pct*circ)+” “+circ;
var fs=size<110?11:15;
return ‘<svg width="'+size+'" height="'+size+'" style="display:block;flex-shrink:0">’
+’<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+t.fillBg+'" stroke-width="'+size*0.078+'"/>’
+’<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+fc+'" stroke-width="'+size*0.078+'" stroke-dasharray="'+dash+'" stroke-linecap="round" transform="rotate(-90 '+cx+' '+cy+')" style="transition:stroke-dasharray 0.8s cubic-bezier(0.34,1.56,0.64,1)"/>’
+’<text x="'+cx+'" y="'+(cy-fs*0.55)+'" text-anchor="middle" fill="'+t.text+'" font-size="'+fs+'" font-weight="800" font-family="Nunito,sans-serif">’+fmt(spent)+’</text>’
+’<text x="'+cx+'" y="'+(cy+fs*0.65)+'" text-anchor="middle" fill="'+t.textMuted+'" font-size="'+(fs-4)+'" font-family="Nunito,sans-serif">of ‘+fmt(total)+’</text>’
+’<text x="'+cx+'" y="'+(cy+fs*1.85)+'" text-anchor="middle" fill="'+fc+'" font-size="'+(fs-2)+'" font-weight="800" font-family="Nunito,sans-serif">’+Math.round(pct*100)+’%</text>’
+’</svg>’;
}

function fillBar(pct,color,t){
var clamp=Math.min(pct,1),fc=fillColor(pct,color,t);
var bg=pct>=1?‘repeating-linear-gradient(45deg,’+fc+’ 0,’+fc+’ 6px,’+t.over+‘99 6px,’+t.over+‘99 12px)’:fc;
return ‘<div style="position:relative;height:10px;background:'+t.fillBg+';border-radius:99px;overflow:hidden">’
+’<div style="position:absolute;left:0;top:0;height:100%;width:'+(clamp*100)+'%;background:'+bg+';border-radius:99px;box-shadow:'+(pct>0?'0 0 8px '+fc+'66':'none')+'"></div>’
+(pct>1?’<div style="position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:9px;color:'+t.over+';font-weight:800;padding-right:4px">OVER</div>’:’’)
+’</div>’;
}

+’<span style="font-size:11px;color:'+t.textMuted+'">’+esc(label)+’</span>’
+’<span style="font-size:'+(big?16:13)+'px;font-weight:'+(big?900:700)+';color:'+color+'">’+esc(value)+’</span>’
+’</div>’;
}

}

// Savings cards
if(pIncome>0){

html+=’<div style=“background:’+t.bgCard+’;border-radius:16px;padding:14px 16px;border:1px solid ‘+(actSav>=0?t.accent+“33”:t.over+“33”)+’;box-shadow:’+t.shadow+’”>’
+’<div style="font-size:10px;color:'+t.textMuted+';font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Actual Savings</div>’
+’<div style="font-size:18px;font-weight:900;color:'+(actSav>=0?t.accent:t.over)+'">’+fmtD(Math.abs(actSav))+’</div>’

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleIncome(){S.showIncome=!S.showIncome;S.incEdit=S.income.monthly>0?String(S.income.monthly):””;render();}
function saveIncome(){var v=parseFloat(S.incEdit)||0;savIncome({monthly:v});S.showIncome=false;showToast(v>0?“Income saved ✓”:“Income cleared”);render();}
function selectCat(id){S.addForm.catId=id;render();}
function gotoAdd(catId){S.addForm.catId=catId;setView(“add”);}
function handleAddExp(){
if(!S.addForm.catId||!S.addForm.amount||isNaN(parseFloat(S.addForm.amount)))return;
var exp={id:Date.now(),catId:S.addForm.catId,amount:parseFloat(S.addForm.amount),note:S.addForm.note.trim(),date:S.addForm.date};
savExps([exp].concat(S.exps));
S.addForm={catId:””,amount:””,note:””,date:new Date().toISOString().split(“T”)[0]};
showToast(“Expense saved ✓”);setView(“budget”);
}
function handleDelExp(id){savExps(S.exps.filter(function(e){return e.id!==id;}));showToast(“Deleted”);render();}
function handleSaveEditCat(){
if(!S.editCat||!S.editCat.name.trim()||!S.editCat.budget)return;
savCats(S.cats.map(function(c){return c.id===S.editCat.id?Object.assign({},S.editCat,{budget:parseFloat(S.editCat.budget)}):c;}));
S.editCat=null;showToast(“Category saved ✓”);render();
}
function handleAddCat(){
var name=S.newCat.name.trim(),budget=parseFloat(S.newCat.budget);
if(!name||!budget||isNaN(budget)||budget<=0){showToast(“Fill in name & budget”);return;}
savCats(S.cats.concat([{id:“cat_”+Date.now(),name:name,emoji:S.newCat.emoji.trim()||“📦”,color:S.newCat.color,budget:budget}]));
S.newCat={name:””,emoji:“📦”,budget:””,color:”#27AE82”};
showToast(’”’+name+’” added ✓’);render();
}
function handleDelCat(id){savCats(S.cats.filter(function(c){return c.id!==id;}));showToast(“Category removed”);render();}
function moveCategory(index,dir){
var ni=index+dir;if(ni<0||ni>=S.cats.length)return;
var arr=S.cats.slice(),item=arr.splice(index,1)[0];arr.splice(ni,0,item);savCats(arr);render();
}
function cycleTheme(){var next=S.themeMode===“auto”?“light”:S.themeMode===“light”?“dark”:“auto”;savTheme(next);render();}
function exportData(){
var data=JSON.stringify({categories:S.cats,expenses:S.exps,income:S.income},null,2);
var blob=new Blob([data],{type:“application/json”});
var url=URL.createObjectURL(blob),a=document.createElement(“a”);
a.href=url;a.download=“spend-together-backup.json”;a.click();URL.revokeObjectURL(url);
showToast(“Backup downloaded ✓”);
}
function importData(e){
var file=e.target.files[0];if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
try{var d=JSON.parse(ev.target.result);
