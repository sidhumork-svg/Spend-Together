function getSunTimes(lat, lng) {
  const now    = new Date();
  const start  = new Date(now.getFullYear(), 0, 0);
  const diff   = now - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);
  const B  = (360 / 365) * (dayOfYear - 81) * (Math.PI / 180);
  const EoT = 9.87 * Math.sin(2*B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  const TC = 4 * lng + EoT;
  const solarNoon = 720 - TC;
  const latRad   = lat * (Math.PI / 180);
  const decl     = 23.45 * Math.sin(B) * (Math.PI / 180);
  const cosHA    = (Math.cos(90.833 * Math.PI/180) - Math.sin(latRad)*Math.sin(decl))
                   / (Math.cos(latRad)*Math.cos(decl));
  if (cosHA < -1 || cosHA > 1) return { sunrise: 6*60, sunset: 19*60 };
  const HA      = Math.acos(cosHA) * (180 / Math.PI);
  const offset  = now.getTimezoneOffset();
  const sunrise = solarNoon - HA*4 - offset;
  const sunset  = solarNoon + HA*4 - offset;
  return { sunrise, sunset };
}

let _sunCache = null, _sunCacheDate = null, _cachedLat = null, _cachedLng = null;

function isDaytime() {
  const now = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  const today = now.toDateString();
  if (_sunCache && _sunCacheDate === today) return mins >= _sunCache.sunrise && mins < _sunCache.sunset;
  if (_cachedLat !== null && _cachedLng !== null) {
    _sunCache = getSunTimes(_cachedLat, _cachedLng);
    _sunCacheDate = today;
    return mins >= _sunCache.sunrise && mins < _sunCache.sunset;
  }
  return now.getHours() >= 6 && now.getHours() < 19;
}
