<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spend Together</title>
</head>
<body style="background:red;">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var h = React.createElement;
var useState = React.useState;

function App() {
var s = useState(0);
var count = s[0], setCount = s[1];

return h(‘div’, {style:{
position:“fixed”, top:0, left:0, right:0, bottom:0,
background:”#141820”, color:“white”,
fontFamily:“sans-serif”, padding:“40px”
}},
h(‘h1’, {style:{color:”#52D9A4”}}, “Spend Together”),
h(‘p’, null, “Count: “ + count),
h(‘button’, {onClick: function(){ setCount(count+1); }}, “Tap +1”)
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(h(App));
</script>

</body>
</html>
