<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test</title>
</head>
<body style="background:#141820;">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
function App() {
  var s = React.useState("budget");
  var view = s[0], setView = s[1];
  return React.createElement('div', {style:{color:"white", padding:40}},
    React.createElement('h1', {style:{color:"#52D9A4", marginBottom:20}}, "Spend Together"),
    React.createElement('p', null, "View: " + view),
    React.createElement('button', {
      onClick: function(){ setView("add"); },
      style:{marginTop:20, padding:"10px 20px", background:"#52D9A4", color:"black", border:"none", borderRadius:8, fontSize:16, cursor:"pointer"}
    }, "Switch to Add")
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
