<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spend Together</title>
</head>
<body style="background:red;">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var h = React.createElement;
var useState = React.useState;

function App() {
var s = useState(“budget”);
var view = s[0];
var setView = s[1];

return h(‘div’, null,
h(‘h1’, {style:{color:“white”}}, “Step 1: App rendered”),
h(‘p’, {style:{color:“white”}}, “View: “ + view),
h(‘button’, {onClick: function(){ setView(“add”); }}, “Tap me - view: “ + view)
);
}

try {
ReactDOM.createRoot(document.getElementById(“root”)).render(h(App));
} catch(e) {
document.body.innerHTML += ’<div style="color:yellow;font-size:14px;padding:10px;">ERROR: ’ + e.message + ‘</div>’;
}
</script>

</body>
</html>
