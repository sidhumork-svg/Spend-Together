<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spend Together</title>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var h = React.createElement;
var useState = React.useState;

function App() {
var s = useState(“budget”);
var view = s[0];
var setView = s[1];

return h(‘div’, {
style: {
background: “#141820”,
color: “white”,
height: “100vh”,
display: “flex”,
flexDirection: “column”,
fontFamily: “sans-serif”,
padding: “20px”
}
},
h(‘h1’, {style: {color: “#52D9A4”, marginBottom: 16}}, “Spend Together”),
h(‘p’, null, “View: “ + view),
h(‘button’, {
onClick: function() { setView(“add”); },
style: {marginTop: 16, padding: “10px 20px”, background: “#52D9A4”, border: “none”, borderRadius: 8, cursor: “pointer”, fontWeight: 800}
}, “Switch View”)
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(h(App));
</script>

</body>
</html>
