<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test</title>
</head>
<body style="background:#141820; color:white; padding:20px; font-family:sans-serif;">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
function reducer(state, action) {
  var next = Object.assign({}, state);
  next[action.key] = action.val;
  return next;
}

function App() {
var init = {count: 0, view: “budget”, income: 0};
var r = React.useReducer(reducer, init);
var state = r[0], dispatch = r[1];

function set(key, val) { dispatch({key:key, val:val}); }

return React.createElement(‘div’, null,
React.createElement(‘p’, null, “Count: “ + state.count),
React.createElement(‘p’, null, “View: “ + state.view),
React.createElement(‘p’, null, “Income: “ + state.income),
React.createElement(‘button’, {onClick: function(){ set(“count”, state.count+1); }, style:{padding:10, background:”#52D9A4”, border:“none”, borderRadius:8, cursor:“pointer”, marginRight:8}}, “Count+1”),
React.createElement(‘button’, {onClick: function(){ set(“view”, state.view===“budget”?“add”:“budget”); }, style:{padding:10, background:”#E8703A”, color:“white”, border:“none”, borderRadius:8, cursor:“pointer”}}, “Toggle view”)
);
}
ReactDOM.createRoot(document.getElementById(“root”)).render(React.createElement(App));
</script>

</body>
</html>
