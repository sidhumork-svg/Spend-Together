<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Spend Together"/>
<title>Spend Together</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#141820;color:#fff;font-family:system-ui,sans-serif;min-height:100vh;padding-bottom:70px;}
#header{background:#1D2330;padding:16px;position:sticky;top:0;z-index:10;}
#header h1{font-size:20px;font-weight:900;color:#52D9A4;margin-bottom:10px;}
.period-nav{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.06);border-radius:10px;padding:4px;}
.period-nav button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 12px;}
.period-nav span{font-weight:800;font-size:14px;color:#fff;}
#nav{position:fixed;bottom:0;left:0;right:0;background:#1A1F2E;border-top:1px solid rgba(255,255,255,0.1);display:flex;}
#nav button{flex:1;border:none;background:none;padding:10px 0 8px;color:rgba(255,255,255,0.3);font-size:11px;cursor:pointer;font-family:inherit;}
#nav button.on{color:#52D9A4;font-weight:900;}
.page{padding:12px 16px;}
.card{background:rgba(255,255,255,0.05);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.07);}
.summary{display:flex;gap:16px;margin-bottom:10px;}
.sum-item{flex:1;text-align:center;}
.sum-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:2px;}
.sum-value{font-size:18px;font-weight:900;}
.cat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cat-name{font-weight:800;font-size:14px;}
.cat-sub{font-size:11px;color:rgba(255,255,255,0.4);}
.cat-amt{font-weight:900;font-size:15px;}
.bar-bg{height:7px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}
.bar-fg{height:100%;border-radius:99px;transition:width 0.3s;}
input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px;color:#fff;font-size:15px;outline:none;width:100%;margin-bottom:10px;font-family:inherit;}
select{background:#1D2330;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px;color:#fff;font-size:15px;outline:none;width:100%;margin-bottom:10px;font-family:inherit;}
.btn{width:100%;padding:14px;background:#52D9A4;color:#141820;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;margin-bottom:8px;font-family:inherit;}
.btn2{width:100%;padding:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:12px;font-size:14px;cursor:pointer;color:rgba(255,255,255,0.5);font-family:inherit;}
.hist-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.del-btn{background:rgba(255,80,80,0.15);border:none;border-radius:6px;padding:4px 8px;color:#ff5252;cursor:pointer;font-size:12px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#52D9A4;color:#141820;padding:8px 20px;border-radius:99px;font-size:13px;font-weight:800;z-index:999;}
.inc-btn{background:rgba(82,217,164,0.15);border:1px solid rgba(82,217,164,0.3);border-radius:20px;padding:4px 12px;color:#52D9A4;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div id="header">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <h1>Spend Together</h1>
    <button class="inc-btn" onclick="toggleIncome()">+ Income</button>
  </div>
  <div class="period-nav">
    <button onclick="shiftMonth(-1)">‹</button>
    <span id="period-label"></span>
    <button onclick="shiftMonth(1)">›</button>
  </div>
</div>

<div id="income-form" style="display:none;padding:12px 16px;">
  <div class="card">
    <div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;">Monthly Income</div>
    <input type="number" id="inc-input" placeholder="e.g. 5000" inputmode="decimal"/>
    <button class="btn" onclick="saveIncome()">Save Income</button>
    <button class="btn2" onclick="toggleIncome()">Cancel</button>
  </div>
</div>

<div id="page-budget" class="page" style="display:none;"></div>
<div id="page-add" class="page" style="display:none;">
  <div class="card">
    <div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;">Amount</div>
    <input type="number" id="add-amount" placeholder="0.00" inputmode="decimal" style="font-size:28px;font-weight:900;color:#52D9A4;"/>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;">Category</div>
    <select id="add-cat"></select>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;">Note</div>
    <input type="text" id="add-note" placeholder="Optional note"/>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:8px;">Date</div>
    <input type="date" id="add-date" style="color-scheme:dark;"/>
    <button class="btn" onclick="saveExpense()">Save Expense</button>
    <button class="btn2" onclick="showPage('budget')">Cancel</button>
  </div>
</div>
<div id="page-history" class="page" style="display:none;"></div>
<div id="page-manage" class="page" style="display:none;"></div>

<div id="nav">
  <button onclick="showPage('budget')" id="nav-budget">📊<br>Budget</button>
  <button onclick="showPage('add')" id="nav-add" style="font-size:22px;">+</button>
  <button onclick="showPage('history')" id="nav-history">🕒<br>History</button>
  <button onclick="showPage('manage')" id="nav-manage">⚙️<br>Manage</button>
</div>

<div id="toast" class="toast" style="display:none;"></div>

<script>
var MONS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var DCATS=[
  {id:"groceries",name:"Groceries",color:"#27AE82",budget:600},
  {id:"dining",name:"Dining Out",color:"#E8703A",budget:300},
  {id:"transport",name:"Transport",color:"#2E86C1",budget:200},
  {id:"utilities",name:"Utilities",color:"#D4AC0D",budget:250},
  {id:"entertainment",name:"Entertainment",color:"#8E44AD",budget:150},
  {id:"shopping",name:"Shopping",color:"#C0392B",budget:400},
  {id:"health",name:"Health",color:"#16A085",budget:150},
  {id:"savings",name:"Savings",color:"#1E8449",budget:500}
];

function lg(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var cats=lg("v1_cats",DCATS);
var exps=lg("v1_exps",[]);
var income=lg("v1_inc",0);
var curMonth=new Date().getMonth();
var curYear=new Date().getFullYear();
var curPage="budget";

function fmt(n){return"$"+Math.round(n);}
function fmtD(n){return"$"+Number(n).toFixed(2);}

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.style.display="block";
  setTimeout(function(){t.style.display="none";},2000);
}

function shiftMonth(d){
  curMonth+=d;
  if(curMonth<0){curMonth=11;curYear--;}
  if(curMonth>11){curMonth=0;curYear++;}
  render();
}

function toggleIncome(){
  var f=document.getElementById("income-form");
  if(f.style.display==="none"){
    f.style.display="block";
    document.getElementById("inc-input").value=income>0?income:"";
  } else {
    f.style.display="none";
  }
}

function saveIncome(){
  income=parseFloat(document.getElementById("inc-input").value)||0;
  ls("v1_inc",income);
  document.getElementById("income-form").style.display="none";
  showToast("Income saved!");
  render();
}

function showPage(p){
  curPage=p;
  ["budget","add","history","manage"].forEach(function(id){
    document.getElementById("page-"+id).style.display=id===p?"block":"none";
    document.getElementById("nav-"+id).className=id===p?"on":"";
  });
  if(p==="add"){
    document.getElementById("add-date").value=new Date().toISOString().split("T")[0];
    document.getElementById("add-amount").value="";
    document.getElementById("add-note").value="";
    renderCatSelect();
  }
  if(p==="history")renderHistory();
  if(p==="manage")renderManage();
  if(p==="budget")renderBudget();
}

function renderCatSelect(){
  var sel=document.getElementById("add-cat");
  sel.innerHTML=cats.map(function(c){return'<option value="'+c.id+'">'+c.name+'</option>';}).join("");
}

function getMonthExps(){
  return exps.filter(function(e){
    var d=new Date(e.date+"T12:00:00");
    return d.getMonth()===curMonth&&d.getFullYear()===curYear;
  });
}

function spentFor(id){
  return getMonthExps().filter(function(e){return e.catId===id;}).reduce(function(s,e){return s+e.amount;},0);
}

function renderBudget(){
  var totB=cats.reduce(function(s,c){return s+c.budget;},0);
  var totS=cats.reduce(function(s,c){return s+spentFor(c.id);},0);
  var html='<div class="card"><div class="summary">';
  if(income>0)html+='<div class="sum-item"><div class="sum-label">Income</div><div class="sum-value" style="color:#52D9A4;font-size:14px;">'+fmtD(income)+'</div></div>';
  html+='<div class="sum-item"><div class="sum-label">Spent</div><div class="sum-value" style="color:#52D9A4;">'+fmtD(totS)+'</div></div>';
  html+='<div class="sum-item"><div class="sum-label">Left</div><div class="sum-value" style="color:'+(totB-totS<0?"#ff5252":"#FFD54F")+';">'+fmtD(totB-totS)+'</div></div>';
  if(income>0)html+='<div class="sum-item"><div class="sum-label">Savings</div><div class="sum-value" style="color:'+(income-totS>=0?"#52D9A4":"#ff5252")+';">'+fmtD(income-totS)+'</div></div>';
  html+='</div></div>';
  cats.forEach(function(cat){
    var spent=spentFor(cat.id),pct=cat.budget>0?spent/cat.budget:0,over=pct>=1,near=pct>=0.85&&!over;
    var col=over?"#ff5252":near?"#FFB74D":cat.color;
    html+='<div class="card" onclick="goAdd(\''+cat.id+'\')" style="cursor:pointer;">';
    html+='<div class="cat-row"><div><div class="cat-name">'+cat.name+'</div><div class="cat-sub">Budget: '+fmt(cat.budget)+'</div></div>';
    html+='<div style="text-align:right"><div class="cat-amt" style="color:'+col+'">'+fmtD(spent)+'</div>';
    html+='<div style="font-size:11px;color:'+(over?"#ff5252":near?"#FFB74D":"rgba(255,255,255,0.2)")+'">'+( over?"+"+fmtD(spent-cat.budget)+" over":fmt(cat.budget-spent)+" left")+'</div></div></div>';
    html+='<div class="bar-bg"><div class="bar-fg" style="width:'+Math.min(pct,1)*100+'%;background:'+col+';"></div></div></div>';
  });
  document.getElementById("page-budget").innerHTML=html;
}

function goAdd(catId){
  showPage("add");
  setTimeout(function(){document.getElementById("add-cat").value=catId;},50);
}

function saveExpense(){
  var amt=parseFloat(document.getElementById("add-amount").value);
  var catId=document.getElementById("add-cat").value;
  var note=document.getElementById("add-note").value.trim();
  var date=document.getElementById("add-date").value;
  if(!amt||isNaN(amt)||!catId||!date){showToast("Fill all fields");return;}
  exps.unshift({id:Date.now(),catId:catId,amount:amt,note:note,date:date});
  ls("v1_exps",exps);
  showToast("Saved!");
  showPage("budget");
}

function renderHistory(){
  var pe=getMonthExps();
  if(pe.length===0){document.getElementById("page-history").innerHTML='<div style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.3);">No expenses this month</div>';return;}
  var html='';
  pe.forEach(function(exp){
    var cat=cats.find(function(c){return c.id===exp.catId;})||{name:"?",color:"#888"};
    var d=new Date(exp.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
    html+='<div class="hist-row">';
    html+='<div style="flex:1"><div style="font-weight:800;font-size:14px;">'+(exp.note||cat.name)+'</div><div style="font-size:11px;color:rgba(255,255,255,0.4);">'+cat.name+' · '+d+'</div></div>';
    html+='<div style="font-weight:900;color:'+cat.color+';margin-right:8px;">'+fmtD(exp.amount)+'</div>';
    html+='<button class="del-btn" onclick="delExp('+exp.id+')">✕</button>';
    html+='</div>';
  });
  document.getElementById("page-history").innerHTML=html;
}

function delExp(id){
  exps=exps.filter(function(e){return e.id!==id;});
  ls("v1_exps",exps);
  showToast("Deleted");
  renderHistory();
}

function renderManage(){
  var html='';
  cats.forEach(function(cat,i){
    html+='<div class="card">';
    html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">';
    html+='<div style="flex:1"><div style="font-weight:800;">'+cat.name+'</div><div style="font-size:12px;color:rgba(255,255,255,0.4);">'+fmt(cat.budget)+'/mo</div></div>';
    html+='<button onclick="editCat('+i+')" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 10px;color:rgba(255,255,255,0.6);cursor:pointer;font-size:12px;">Edit</button>';
    html+='<button onclick="delCat(\''+cat.id+'\')" style="background:rgba(255,80,80,0.15);border:none;border-radius:8px;padding:5px 8px;color:#ff5252;cursor:pointer;font-size:13px;margin-left:4px;">✕</button>';
    html+='</div>';
    html+='<div id="edit-'+i+'" style="display:none;">';
    html+='<input id="en-'+i+'" value="'+cat.name+'" placeholder="Name"/>';
    html+='<input id="eb-'+i+'" type="number" value="'+cat.budget+'" placeholder="Budget"/>';
    html+='<button class="btn" onclick="saveCat('+i+')" style="margin-bottom:6px;">Save</button>';
    html+='<button class="btn2" onclick="document.getElementById(\'edit-'+i+'\').style.display=\'none\'">Cancel</button>';
    html+='</div>';
    html+='</div>';
  });
  html+='<div class="card" style="border:1px dashed rgba(255,255,255,0.15);">';
  html+='<div style="font-size:12px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:10px;">+ New Category</div>';
  html+='<input id="nc-name" placeholder="Category name"/>';
  html+='<input id="nc-budget" type="number" placeholder="Budget ($)"/>';
  html+='<button class="btn" onclick="addCat()">Add Category</button>';
  html+='</div>';
  document.getElementById("page-manage").innerHTML=html;
}

function editCat(i){
  var el=document.getElementById("edit-"+i);
  el.style.display=el.style.display==="none"?"block":"none";
}

function saveCat(i){
  var name=document.getElementById("en-"+i).value.trim();
  var budget=parseFloat(document.getElementById("eb-"+i).value);
  if(!name||!budget)return;
  cats[i].name=name;cats[i].budget=budget;
  ls("v1_cats",cats);
  showToast("Saved!");
  renderManage();
}

function delCat(id){
  cats=cats.filter(function(c){return c.id!==id;});
  ls("v1_cats",cats);
  showToast("Deleted");
  renderManage();
}

function addCat(){
  var name=document.getElementById("nc-name").value.trim();
  var budget=parseFloat(document.getElementById("nc-budget").value);
  if(!name||!budget){showToast("Fill name & budget");return;}
  cats.push({id:"c"+Date.now(),name:name,color:"#52D9A4",budget:budget});
  ls("v1_cats",cats);
  showToast("Added!");
  renderManage();
}

function render(){
  document.getElementById("period-label").textContent=MONS[curMonth]+" "+curYear;
  if(curPage==="budget")renderBudget();
  if(curPage==="history")renderHistory();
}

// Init
document.getElementById("add-date").value=new Date().toISOString().split("T")[0];
render();
showPage("budget");
</script>

</body>
</html>
