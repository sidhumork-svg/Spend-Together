<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test</title>
</head>
<body style="background:white;color:black;padding:40px;font-family:sans-serif;font-size:20px;">
  <div id="root">Loading...</div>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    function App() {
      var s = React.useState(0);
      var count = s[0], setCount = s[1];
      return React.createElement('div', null,
        React.createElement('h1', null, '✅ React works!'),
        React.createElement('p', null, 'Count: ' + count),
        React.createElement('button', {onClick: function(){ setCount(count+1); }}, 'Tap me')
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
