<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test</title>
</head>
<body style="background:#141820; color:white; padding:20px; font-family:sans-serif;">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
function App() {
  var s = React.useState(0);
  var count = s[0], setCount = s[1];
  return React.createElement('div', null,
    React.createElement('div', {style:{color:"white", fontSize:20}}, "Count: " + count),
    React.createElement('button', {
      onClick: function(){ setCount(count+1); },
      style:{marginTop:16, padding:"10px 20px", background:"#52D9A4", color:"black", border:"none", borderRadius:8, cursor:"pointer", fontSize:16}
    }, "Tap +1")
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
