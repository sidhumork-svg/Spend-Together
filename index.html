<script>

}

<script>
// Part 2: components
function Ring(p){
  var sp=p.spent,to=p.total,t=p.t,sz=p.size||120;
  var pct=to>0?Math.min(sp/to,1):0;
  var r=sz*0.42,cx=sz/2,cy=sz/2,ci=2*Math.PI*r;
  var col=pct>=1?t.ov:pct>=0.85?t.nr:t.ac;
  var fs=14;
  return h('svg',{width:sz,height:sz,style:{display:"block",flexShrink:0}},
    h('circle',{cx:cx,cy:cy,r:r,fill:"none",stroke:t.fb,strokeWidth:sz*0.08}),
    h('circle',{cx:cx,cy:cy,r:r,fill:"none",stroke:col,strokeWidth:sz*0.08,strokeDasharray:(pct*ci)+" "+ci,strokeLinecap:"round",transform:"rotate(-90 "+cx+" "+cy+")"}),
    h('text',{x:cx,y:cy-fs*0.5,textAnchor:"middle",fill:t.tx,fontSize:fs,fontWeight:800,fontFamily:"Nunito,sans-serif"},fmt(sp)),
    h('text',{x:cx,y:cy+fs*0.7,textAnchor:"middle",fill:t.tm,fontSize:fs-3,fontFamily:"Nunito,sans-serif"},"of "+fmt(to)),
    h('text',{x:cx,y:cy+fs*1.9,textAnchor:"middle",fill:col,fontSize:fs-2,fontWeight:800,fontFamily:"Nunito,sans-serif"},Math.round(pct*100)+"%")
  );
}

function Bar(p){
  var pct=p.pct,col=fc(pct,p.color,p.t),cl=Math.min(pct,1);
  return h('div',{style:{position:"relative",height:10,background:p.t.fb,borderRadius:99,overflow:"hidden"}},
    h('div',{style:{position:"absolute",left:0,top:0,height:"100%",width:(cl*100)+"%",background:pct>=1?"repeating-linear-gradient(45deg,"+col+" 0,"+col+" 6px,"+p.t.ov+"99 6px,"+p.t.ov+"99 12px)":col,borderRadius:99}})
  );
}
</script>

<script>

  var s11=useState(false),showInc=s11[0],setShowInc=s11[1];
  var s12=useState(""),incEd=s12[0],setIncEd=s12[1];
  var s13=useState(null),toast=s13[0],setToast=s13[1];
  var s14=useState("local"),sync=s14[0],setSync=s14[1];

  var dark=isDark(thm),t=getT(dark);

  function inPer(exp){var d=new Date(exp.date+"T12:00:00");if(dur==="Monthly")return d.getMonth()===per.month&&d.getFullYear()===per.year;if(dur==="Yearly")return d.getFullYear()===per.year;return true;}
  function shiftPer(dir){if(dur==="Monthly"){var m=per.month+dir,y=per.year;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setPer({month:m,year:y});}else{setPer(function(p){return{month:p.month,year:p.year+dir};});}}
  function perLabel(){if(dur==="Monthly")return MONS[per.month]+" "+per.year;if(dur==="Yearly")return ""+per.year;return "This Week";}
  var pExps=exps.filter(inPer);
  function spentFor(id){return pExps.filter(function(e){return e.catId===id;}).reduce(function(s,e){return s+e.amount;},0);}
  var totB=cats.reduce(function(s,c){return s+c.budget;},0);

  var actSav=pInc>0?pInc-totS:null;
  function doAdd(){if(!af.catId||!af.amount||isNaN(parseFloat(af.amount)))return;savE([{id:Date.now(),catId:af.catId,amount:parseFloat(af.amount),note:af.note.trim(),date:af.date}].concat(exps));setAf({catId:"",amount:"",note:"",date:new Date().toISOString().split("T")[0]});toast2("Saved");setView("budget");}
  function doDel(id){savE(exps.filter(function(e){return e.id!==id;}));toast2("Deleted");}
  function doSaveEdit(){if(!editC||!editC.name.trim()||!editC.budget)return;savC(cats.map(function(c){return c.id===editC.id?Object.assign({},editC,{budget:parseFloat(editC.budget)}):c;}));setEditC(null);toast2("Saved");}
  function doAddCat(){var name=nc.name.trim(),budget=parseFloat(nc.budget);if(!name||!budget||isNaN(budget)){toast2("Fill name & budget");return;}savC(cats.concat([{id:"c"+Date.now(),name:name,emoji:nc.emoji||"*",color:nc.color,budget:budget}]));setNc({name:"",emoji:"",budget:"",color:"#27AE82"});toast2("Added");}
  function doDelCat(id){savC(cats.filter(function(c){return c.id!==id;}));}
  function doSaveInc(){var v=parseFloat(incEd)||0;savI({monthly:v});setShowInc(false);toast2(v>0?"Income saved":"Cleared");}

  var canSave=af.catId&&af.amount&&!isNaN(parseFloat(af.amount));
  var selCat=cats.find(function(c){return c.id===af.catId;});
  var IS={width:"100%",background:t.bgi,border:"1px solid "+t.bi,borderRadius:12,padding:"12px 14px",color:t.tx,fontSize:15,fontWeight:700,outline:"none",marginBottom:14,display:"block",fontFamily:"Nunito,sans-serif"};

  var pNav=h('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",background:t.bgp,borderRadius:12,padding:"8px 6px"}},
    h('button',{className:"tb",onClick:function(){shiftPer(-1);},style:{background:"none",border:"none",color:t.tm,fontSize:22,cursor:"pointer",padding:"0 10px"}},"<"),
    h('span',{style:{fontWeight:800,fontSize:14,color:t.tx}},perLabel()),
    h('button',{className:"tb",onClick:function(){shiftPer(1);},style:{background:"none",border:"none",color:t.tm,fontSize:22,cursor:"pointer",padding:"0 10px"}},">")
  );

  function BudgetView(){
    return h('div',{style:{padding:"8px 16px 80px"}},
      h('div',{className:"tb",onClick:function(){setShowInc(function(v){return !v;});},style:{display:"flex",alignItems:"center",justifyContent:"space-between",background:t.bgc,borderRadius:16,padding:"12px 16px",marginBottom:10,border:"1px solid "+t.bc,cursor:"pointer"}},

          h('span',{style:{fontSize:20}},"$"),

            h('div',{style:{fontSize:16,fontWeight:900,color:pInc>0?t.ac:t.tf}},pInc>0?fmtD(income.monthly):"Tap to set income")
          )
        ),
        h('span',{style:{color:t.tm}},showInc?"^":"v")

          return h('div',{key:cat.id,className:"tb",onClick:function(){setAf(function(f){return Object.assign({},f,{catId:cat.id});});setView("add");},style:{background:t.bgc,borderRadius:16,padding:"14px 16px",border:"1px solid "+(over?t.ov+"44":near?t.nr+"33":t.bc),cursor:"pointer"}},

      ),
      h('button',{className:"tb",onClick:doAdd,disabled:!canSave,style:{width:"100%",padding:16,background:t.ag,color:t.at,border:"none",borderRadius:14,fontSize:16,fontFamily:"Nunito,sans-serif",fontWeight:900,cursor:"pointer",marginBottom:10,opacity:canSave?1:0.4}},"Save Expense"),
      h('button',{className:"tb",onClick:function(){setView("budget");},style:{width:"100%",padding:13,background:t.bgp,border:"1px solid "+t.bc,borderRadius:14,fontSize:14,fontFamily:"Nunito,sans-serif",cursor:"pointer",color:t.tm}},"Cancel")
    );
  }

  function HistoryView(){
    return h('div',{style:{padding:"8px 16px 80px"}},
      pExps.length===0
        ?h('div',{style:{textAlign:"center",padding:"80px 0",color:t.tm}},"No expenses this period")
        :h('div',{style:{display:"flex",flexDirection:"column",gap:8}},
          pExps.map(function(exp){
            var cat=cats.find(function(c){return c.id===exp.catId;});
            return h('div',{key:exp.id,style:{background:t.bgc,borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,border:"1px solid "+t.bc}},
              h('div',{style:{width:36,height:36,borderRadius:10,background:(cat&&cat.color||"#888")+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}},cat&&cat.emoji||"?"),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{fontWeight:800,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:t.tx}},exp.note||(cat&&cat.name)||"Expense"),
                h('div',{style:{fontSize:11,color:t.tm,marginTop:2}},(cat&&cat.name||"")+" - "+new Date(exp.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}))
              ),
              h('span',{style:{fontWeight:900,fontSize:15,color:(cat&&cat.color)||t.ac,flexShrink:0}},fmtD(exp.amount)),
              h('button',{className:"tb",onClick:function(){doDel(exp.id);},style:{background:t.ov+"18",border:"none",borderRadius:8,padding:"5px 9px",color:t.ov,cursor:"pointer",fontSize:13,flexShrink:0}},"X")
            );
          })
        )
    );
  }

  function ManageView(){
    return h('div',{style:{padding:"8px 16px 80px"}},
      h('div',{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:16}},
        cats.map(function(cat){
          return h('div',{key:cat.id,style:{background:t.bgc,borderRadius:16,padding:14,border:"1px solid "+t.bc}},
            editC&&editC.id===cat.id
              ?h('div',null,
                  h('div',{style:{display:"flex",gap:10,marginBottom:10}},
                    h('input',{value:editC.emoji,onChange:function(e){setEditC(function(f){return Object.assign({},f,{emoji:e.target.value});});},style:Object.assign({},IS,{width:52,textAlign:"center",fontSize:22,padding:8,marginBottom:0}),maxLength:2}),
                    h('input',{value:editC.name,onChange:function(e){setEditC(function(f){return Object.assign({},f,{name:e.target.value});});},style:Object.assign({},IS,{flex:1,marginBottom:0}),placeholder:"Name"})
                  ),
                  h('input',{type:"number",value:editC.budget,onChange:function(e){setEditC(function(f){return Object.assign({},f,{budget:e.target.value});});},style:IS,placeholder:"Budget ($)"}),
                  h('div',{style:{display:"flex",gap:8}},
                    h('button',{className:"tb",onClick:doSaveEdit,style:{flex:1,padding:11,background:t.ag,color:t.at,border:"none",borderRadius:14,fontSize:14,fontFamily:"Nunito,sans-serif",fontWeight:900,cursor:"pointer"}},"Save"),
                    h('button',{className:"tb",onClick:function(){setEditC(null);},style:{flex:1,padding:11,background:t.bgp,border:"1px solid "+t.bc,borderRadius:14,fontSize:14,fontFamily:"Nunito,sans-serif",cursor:"pointer",color:t.tm}},"Cancel")
                  )
                )
              :h('div',{style:{display:"flex",alignItems:"center",gap:10}},
                  h('div',{style:{width:36,height:36,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}},cat.emoji),
                  h('div',{style:{flex:1}},
                    h('div',{style:{fontWeight:800,fontSize:14,color:t.tx}},cat.name),
                    h('div',{style:{fontSize:12,color:t.tm}},fmt(cat.budget))
                  ),
                  h('button',{className:"tb",onClick:function(){setEditC(Object.assign({},cat));},style:{background:t.bgp,border:"1px solid "+t.bc,borderRadius:8,padding:"6px 12px",color:t.ts,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:800}},"Edit"),
                  h('button',{className:"tb",onClick:function(){doDelCat(cat.id);},style:{background:t.ov+"18",border:"none",borderRadius:8,padding:"6px 10px",color:t.ov,cursor:"pointer",fontSize:14}},"X")
                )
          );
        })
      ),
      h('div',{style:{background:t.bgc,borderRadius:16,padding:18,border:"1px dashed "+t.bd}},
        h('div',{style:{fontSize:12,color:t.tm,fontWeight:800,textTransform:"uppercase",letterSpacing:1,marginBottom:14}},"+ New Category"),
        h('div',{style:{display:"flex",gap:10,marginBottom:12}},
          h('input',{value:nc.emoji,onChange:function(e){setNc(function(f){return Object.assign({},f,{emoji:e.target.value});});},style:Object.assign({},IS,{width:56,textAlign:"center",fontSize:22,padding:8,marginBottom:0}),maxLength:2}),
          h('input',{value:nc.name,onChange:function(e){setNc(function(f){return Object.assign({},f,{name:e.target.value});});},style:Object.assign({},IS,{flex:1,marginBottom:0}),placeholder:"Category name"})
        ),
        h('input',{type:"number",value:nc.budget,onChange:function(e){setNc(function(f){return Object.assign({},f,{budget:e.target.value});});},style:IS,placeholder:"Budget ($)"}),
        h('button',{className:"tb",onClick:doAddCat,style:{width:"100%",padding:14,background:t.ag,color:t.at,border:"none",borderRadius:14,fontSize:15,fontFamily:"Nunito,sans-serif",fontWeight:900,cursor:"pointer"}},"Add Category")
      )
    );
  }

  return h('div',{style:{fontFamily:"Nunito,sans-serif",background:t.bg,height:"100vh",maxWidth:430,margin:"0 auto",color:t.tx,display:"flex",flexDirection:"column",overflow:"hidden"}},
    toast&&h('div',{style:{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:t.ac,color:t.at,padding:"10px 22px",borderRadius:99,fontSize:14,fontWeight:800,zIndex:300,whiteSpace:"nowrap",pointerEvents:"none",animation:"toastIn 2.2s forwards"}},toast),
    h('div',{style:{flexShrink:0,padding:"22px 20px 14px",background:t.bgh}},
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        h('div',null,
          h('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:3}},
            h('div',{style:{fontSize:10,color:t.tm,letterSpacing:3,textTransform:"uppercase"}},"Our Budget"),
            h('div',{style:{fontSize:10,color:syncColor,fontWeight:800,background:syncColor+"22",borderRadius:99,padding:"2px 8px"}},syncLabel)
          ),
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:t.tx}},"Spend Together")
        ),
        h('div',{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}},
          h('button',{className:"tb",onClick:cycleThm,style:{background:t.bgp,border:"1px solid "+t.bc,borderRadius:20,padding:"5px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:800,color:t.ts}},thmIcon),
          h('div',{style:{display:"flex",background:t.bgp,borderRadius:20,padding:3,gap:2}},
            DURS.map(function(d){
              return h('button',{key:d,className:"tb",onClick:function(){setDur(d);},style:{border:"none",borderRadius:17,padding:"5px 10px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit",background:dur===d?t.bgpa:"transparent",color:dur===d?t.tx:t.tm}},d.slice(0,2));
            })
          )
        )
      ),
      pNav
    ),
    h('div',{className:"sa",style:{flex:1,minHeight:0}},
      view==="budget"&&h(BudgetView,null),
      view==="add"&&h(AddView,null),
      view==="history"&&h(HistoryView,null),
      view==="manage"&&h(ManageView,null)
    ),
    h('div',{style:{flexShrink:0,background:t.bgn,borderTop:"1px solid "+t.bn,display:"flex"}},
      NAVS.map(function(tab){
        return h('button',{key:tab.id,className:"tb",onClick:function(){setView(tab.id);},style:{flex:1,border:"none",background:"none",padding:"12px 0 10px",cursor:"pointer",color:view===tab.id?t.ac:t.tn,fontFamily:"inherit"}},
          h('div',{style:{fontSize:20}},tab.icon),
          h('div',{style:{fontSize:10,marginTop:3,fontWeight:view===tab.id?900:600}},tab.label)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
