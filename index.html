<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test</title>
</head>
<body style="background:#141820; color:white; padding:20px; font-family:sans-serif;">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var DCATS = [
  {id:"groceries", name:"Groceries", color:"#27AE82", budget:600},
  {id:"dining", name:"Dining Out", color:"#E8703A", budget:300},
  {id:"transport", name:"Transport", color:"#2E86C1", budget:200}
];

function lsG(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}}

function App() {
var s1 = React.useState(lsG(“cats”, DCATS));
var cats = s1[0];

return React.createElement(‘div’, null,
React.createElement(‘h1’, {style:{color:”#52D9A4”}}, “Spend Together”),
React.createElement(‘p’, null, “Cats loaded: “ + cats.length),
React.createElement(‘p’, null, “First cat: “ + cats[0].name),
React.createElement(‘p’, null, “Budget: $” + cats[0].budget)
);
}
ReactDOM.createRoot(document.getElementById(“root”)).render(React.createElement(App));
</script>

</body>
</html>
