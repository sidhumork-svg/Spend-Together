<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Debug2</title>
</head>
<body style="background:white;color:black;padding:20px;font-family:sans-serif;">
  <div id="log"></div>
  <script>
    function log(msg,color){var d=document.createElement('div');d.style.cssText='color:'+(color||'black')+';margin-bottom:8px;padding:6px;background:#f0f0f0;border-radius:4px;font-size:14px;';d.textContent=msg;document.getElementById('log').appendChild(d);}
    log('✅ Step 1: Page loaded');
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
    onload="log('✅ Step 2: React loaded')"
    onerror="log('❌ React failed','red')"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"
    onload="log('✅ Step 3: ReactDOM loaded')"
    onerror="log('❌ ReactDOM failed','red')"></script>
  <script>
    log('✅ Step 4: Inline script running');
    try {
      log('React version: ' + React.version);
      log('✅ Step 5: React accessible');
    } catch(e) { log('❌ React not accessible: '+e.message,'red'); }
    try {
      function App(){
        var s=React.useState(0);
        return React.createElement('div',{style:{color:'green',fontSize:18,fontWeight:'bold'}},'✅ Step 6: App rendered! Count='+s[0]);
      }
      var root=ReactDOM.createRoot(document.getElementById('log').appendChild(document.createElement('div')));
      root.render(React.createElement(App));
      log('✅ Step 7: Render called successfully');
    } catch(e) { log('❌ Render error: '+e.message,'red'); log(e.stack,'red'); }
  </script>
</body>
</html>
