<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spend Together</title>
</head>
<body style="background:red;">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

// Test 1: Does useState with a function work?
function App() {
var s1 = useState(function(){ return [1,2,3]; });
var list = s1[0];

// Test 2: Does useRef work?
var ref1 = useRef({});

// Test 3: Does useEffect work?
useEffect(function(){
ref1.current.ran = true;
}, []);

// Test 4: Does mapping work?
var items = list.map(function(x) {
return h(‘div’, {key:x, style:{color:“white”, fontSize:20}}, “Item “ + x);
});

return h(‘div’, {style:{padding:20}},
h(‘h1’, {style:{color:“white”}}, “Tests passing!”),
h(‘div’, null, items)
);
}

try {
ReactDOM.createRoot(document.getElementById(“root”)).render(h(App));
} catch(e) {
document.body.innerHTML = ’<div style="color:yellow;padding:20px;font-size:16px;">CRASH: ’ + e.message + ‘<br>’ + e.stack + ‘</div>’;
}
</script>

</body>
</html>
